      lines.push("");
      lines.push("TOURNAMENT / TRAVEL / NOTES BY DAY");
      lines.push(["date","tournament","travel","note"].join(","));
      var notesAll=getJSON(K_NOTES,{});
      var allDays={};
      Object.keys(flags).forEach(function(k){allDays[k]=1;});
      Object.keys(notesAll).forEach(function(k){allDays[k]=1;});
      Object.keys(allDays).sort().forEach(function(k){
        var f=flags[k]||{};
        lines.push([k, f.tourn?"yes":"", f.travel||"", esc(notesAll[k]||"")].join(","));
      });

      var csv=lines.join("\n");
      var stamp=new Date().toISOString().slice(0,10);
      var name="readiness-export-"+stamp+".csv";

      // try a real file download first
      var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url; a.download=name;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); if(a.parentNode)a.parentNode.removeChild(a); },1500);

      // also show it on screen so it can be copied if the download is awkward on iOS
      showExportText(csv,name);
    }catch(e){
      alert("Export failed: "+e.message);
    }
  }

  // fallback view — selectable text you can copy/share if the file download doesn't stick on iOS
  function showExportText(csv,name){
    var ov=document.createElement("div");
    ov.style.cssText="position:fixed;inset:0;background:"+C.bg+"F2;z-index:9999;padding:16px;overflow:auto;-webkit-overflow-scrolling:touch;";
    var h=document.createElement("div");h.style.cssText="color:"+C.ink+";font-weight:700;font-size:16px;margin-bottom:6px;";h.textContent="Your data export";
    var sub=document.createElement("div");sub.className="cnote";sub.style.cssText="color:"+C.muted+";margin-bottom:10px;";
    sub.textContent="Saved as "+name+" if your browser allowed the download. Otherwise: tap and hold below, Select All, Copy \u2014 then paste into Notes or an email to yourself.";
    var ta=document.createElement("textarea");
    ta.value=csv;
    ta.style.cssText="width:100%;height:52vh;background:"+C.panel2+";color:"+C.ink+";border:1px solid "+C.line+";border-radius:10px;padding:10px;font-size:12px;font-family:ui-monospace,Menlo,monospace;";
    var row=document.createElement("div");row.className="btnrow";row.style.marginTop="10px";
    var cp=document.createElement("button");cp.className="btn btn-primary";cp.textContent="Copy all";
    cp.onclick=function(){ try{ ta.select(); document.execCommand("copy"); cp.textContent="Copied \u2713"; }catch(e){ cp.textContent="Select manually"; } };
    var cl=document.createElement("button");cl.className="btn btn-ghost";cl.textContent="Close";
    cl.onclick=function(){ if(ov.parentNode) ov.parentNode.removeChild(ov); };
    row.appendChild(cp);row.appendChild(cl);
    ov.appendChild(h);ov.appendChild(sub);ov.appendChild(ta);ov.appendChild(row);
    document.body.appendChild(ov);
  }

  // ---------- app render ----------
  var app=document.getElementById("app");
  var ouraStatus={state:"idle",msg:""};
  var TAB="today";
  var TABSCROLL=0;
  var PREVTAB=null;
  var RANGE="14"; // date filter for chart tabs: 7 | 14 | 30 | 90 | 180 | all | custom (default 14d)
  var RFROM="", RTO=""; // custom calendar range (YYYY-MM-DD)
  var TABS=[["today","Today"],["history","History"],["training","Training"],["gymtrends","Gym Trends"],["trends","Trends"],["compare","Compare"],["oura","Oura"],["hp360","360HP"],["insights","Insights"]];

  function render(savedFlash){
    var keepScroll=(typeof window!=="undefined"&&window.pageYOffset)?window.pageYOffset:0;
    var arr=fuse();
    var model=arr.length?analyze(arr):[];
    var today=model.length?model[model.length-1]:null;
    app.innerHTML="";

    var head=document.createElement("div");head.className="head";
    head.innerHTML='<div><div class="title">Readiness</div><div class="sub">Fused HRV signal \u2014 360HP + Oura</div></div>'+
      (today?'<div class="latest">Latest reading<br><b class="mono">'+today.iso+'</b></div>':'');
    app.appendChild(head);

    var fileInput=document.createElement("input");fileInput.type="file";fileInput.accept=".csv";fileInput.style.display="none";
    fileInput.addEventListener("change",function(ev){var f=ev.target.files&&ev.target.files[0];if(!f)return;
      var rd=new FileReader();rd.onload=function(x){try{var p=parseCSV(x.target.result);
        if(!p.length||!("rMSSD" in p[0])){alert("That file doesn't look like a 360HP export \u2014 no rMSSD column found.");return;}
        setJSON(K_ROWS,p);render(true);}catch(e){alert("Couldn't read that file. Make sure it's the raw 360HP CSV export.");}};
      rd.readAsText(f);});
    app.appendChild(fileInput);

    if(savedFlash){var sv=document.createElement("div");sv.className="saved";sv.textContent="Saved to this device.";app.appendChild(sv);
      setTimeout(function(){if(sv.parentNode)sv.parentNode.removeChild(sv);},2200);}

    // sync status bar
    var sync=document.createElement("div");sync.className="sync";
    var tt=get(K_OURATIME); var when=tt?new Date(parseInt(tt,10)):null;
    var dotClass=ouraStatus.state==="ok"||getJSON(K_OURA,null)?"dotlive":(ouraStatus.state==="err"?"doterr":"dotoff");
    var syncMsg;
    if(ouraStatus.state==="loading") syncMsg="Syncing with Oura\u2026";
    else if(ouraStatus.state==="err") syncMsg="Oura sync issue: "+ouraStatus.msg;
    else if(getJSON(K_OURA,null)) syncMsg="Oura connected"+(when?" \u00b7 updated "+when.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"");
    else syncMsg="Oura not synced yet";
    sync.innerHTML='<span class="'+dotClass+'"></span><span>'+syncMsg+'</span>';
    var refresh=document.createElement("button");refresh.className="btn btn-ghost";refresh.style.marginLeft="auto";refresh.style.padding="6px 12px";refresh.textContent="Sync Oura";
    refresh.onclick=function(){ ouraStatus={state:"loading",msg:""}; render(false);
      fetchOura(function(res){ ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"}; render(false); }); };
    sync.appendChild(refresh);
    app.appendChild(sync);

    // no data yet -> onboarding, no tabs
    if(!today || !today.has){
      var p=document.createElement("div");p.className="panel";
      p.innerHTML='<div class="ctitle">Get started</div>'+
        '<p class="cnote" style="font-size:14px">Two sources feed your signal. <span class="tag tag-360">360HP</span> is your HRV anchor \u2014 import its CSV. <span class="tag tag-oura">Oura</span> pulls automatically to add readiness, sleep, resting HR and body temperature.</p>';
      var b=document.createElement("button");b.className="btn btn-primary";b.style.padding="12px 20px";b.style.fontSize="15px";b.textContent="Import 360HP CSV";b.onclick=function(){fileInput.click();};
      p.appendChild(b);
      var b3=document.createElement("button");b3.className="btn btn-ghost";b3.style.marginLeft="10px";b3.style.padding="12px 20px";b3.textContent="Sync Oura now";
      b3.onclick=function(){ouraStatus={state:"loading",msg:""};render(false);fetchOura(function(res){ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"};render(false);});};
      p.appendChild(b3);
      app.appendChild(p);
      var foot0=document.createElement("div");foot0.className="foot";
      foot0.textContent="Signal, not diagnosis. This fuses trends across your own data to suggest how hard to go \u2014 it doesn't replace how you actually feel or medical advice.";
      app.appendChild(foot0);
      return;
    }

    // tab bar
    var tabbar=document.createElement("div");tabbar.className="tabbar";
    var activeBtn=null;
    TABS.forEach(function(t){var b=document.createElement("button");b.className="tabbtn"+(TAB===t[0]?" active":"");b.textContent=t[1];
      if(TAB===t[0]) activeBtn=b;
      b.onclick=function(){ TABSCROLL=tabbar.scrollLeft; TAB=t[0]; render(false); };tabbar.appendChild(b);});
    app.appendChild(tabbar);
    // restore the horizontal scroll from before the re-render, then nudge the active tab into view
    tabbar.scrollLeft=TABSCROLL;
    if(activeBtn&&activeBtn.scrollIntoView){ try{ activeBtn.scrollIntoView({inline:"center",block:"nearest"}); }catch(e){} }

    var body=document.createElement("div");app.appendChild(body);

    // date-range filter — applies to the data/chart tabs (not Today or Training)
    var rangeTabs={trends:1,compare:1,oura:1,insights:1,history:1,hp360:1};
    var fmodel=model;
    if(rangeTabs[TAB]){
      // preset dropdown
      var rsel=document.createElement("div");rsel.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:10px;";
      var rlab=document.createElement("span");rlab.style.cssText="font-size:12px;color:"+C.muted+";";rlab.textContent="Show";
      var opts=[["7","7 days"],["14","14 days"],["30","30 days"],["90","90 days"],["180","6 months"],["all","All"]];
      var rdd=document.createElement("select");rdd.style.cssText="flex:1;padding:9px 11px;border-radius:8px;border:1px solid "+(RANGE!=="custom"?C.glow+"66":C.line)+";background:"+C.panel2+";color:"+C.ink+";font-size:14px;";
      opts.forEach(function(o){var op=document.createElement("option");op.value=o[0];op.textContent=o[1];if(RANGE===o[0])op.selected=true;rdd.appendChild(op);});
      rdd.onchange=function(){RANGE=rdd.value;RFROM="";RTO="";render(false);};
      rsel.appendChild(rlab);rsel.appendChild(rdd);
      body.appendChild(rsel);

      // custom calendar range (From / To)
      var crow=document.createElement("div");crow.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;";
      var dateCss="padding:8px 10px;border-radius:8px;border:1px solid "+(RANGE==="custom"?C.glow+"88":C.line)+";background:"+C.panel2+";color:"+C.ink+";font-size:14px;";
      var fromL=document.createElement("span");fromL.style.cssText="font-size:12px;color:"+C.muted+";";fromL.textContent="From";
      var fromI=document.createElement("input");fromI.type="date";fromI.value=RFROM;fromI.style.cssText=dateCss;
      var toL=document.createElement("span");toL.style.cssText="font-size:12px;color:"+C.muted+";";toL.textContent="To";
      var toI=document.createElement("input");toI.type="date";toI.value=RTO;toI.style.cssText=dateCss;
      function applyCustom(){ RFROM=fromI.value; RTO=toI.value; if(RFROM||RTO){RANGE="custom";} render(false); }
      fromI.addEventListener("change",applyCustom); toI.addEventListener("change",applyCustom);
      crow.appendChild(fromL);crow.appendChild(fromI);crow.appendChild(toL);crow.appendChild(toI);
      if(RANGE==="custom"){var clr=document.createElement("button");clr.className="btn btn-ghost";clr.style.cssText="padding:7px 12px;font-size:12px;";clr.textContent="Clear";
        clr.onclick=function(){RANGE="all";RFROM="";RTO="";render(false);};crow.appendChild(clr);}
      body.appendChild(crow);

      // apply the filter
      if(RANGE==="custom"&&(RFROM||RTO)){
        fmodel=model.filter(function(d){return (!RFROM||d.iso>=RFROM)&&(!RTO||d.iso<=RTO);});
      } else if(RANGE!=="all"&&RANGE!=="custom"){
        var days=parseInt(RANGE,10);
        var cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
        var cutISO=cutoff.toISOString().slice(0,10);
        fmodel=model.filter(function(d){return d.iso>=cutISO;});
      }
      if(fmodel!==model && fmodel.length<2){
        var rn=document.createElement("div");rn.className="cnote";rn.style.marginBottom="12px";
        rn.textContent="Only "+fmodel.length+" day(s) in this range \u2014 widen it for fuller charts.";
        body.appendChild(rn);
      }
    }

    if(TAB==="today"){
      var bc=C[today.band], bs=C[today.band+"Soft"];
      var v=document.createElement("div");v.className="verdict";
      v.style.background=bs;v.style.border="1px solid "+bc+"55";v.style.boxShadow="0 0 40px -12px "+bc+"66";
      var confColor = today.confidence.indexOf("high")>=0?C.green:today.confidence.indexOf("mixed")>=0?C.amber:C.muted;
      // trend basis line — makes clear the score is relative to your rolling baseline, not one day
      var trendBits=[];
      if(today.hDev!=null){ var pct=Math.round(today.hDev*100);
        trendBits.push("HRV "+(pct>=0?"+":"")+pct+"% vs your 7-day baseline"); }
      if(today.roll7!=null&&today.roll30!=null){
        var dir=today.roll7>=today.roll30; trendBits.push("<span style='color:"+(dir?C.green:C.amber)+"'>"+(dir?"\u25b2 trend climbing":"\u25bc trend sliding")+"</span>"); }
      var trendLine=trendBits.length?'<div style="font-size:12.5px;color:'+C.muted+';margin-top:10px;font-weight:600">'+trendBits.join("  \u00b7  ")+'</div>':'';
      // tournament is today's flag; travel is YESTERDAY's (a flight hits the next morning)
      var todayFlags=getFlags(today.iso);
      var tournOn=!!todayFlags.tourn;
      var travelMode=today.travel||"";
      var travelOn=!!travelMode;
      var bodyText=VERD[today.band].b;
      if(tournOn){
        if(today.band==="green") bodyText="Tournament week: you're fresh. Keep it that way \u2014 sharpen, don't grind. Save the tank for the course.";
        else if(today.band==="yellow") bodyText="Tournament week: middling readiness. Light and sharp only \u2014 prioritise being fresh over getting work in.";
        else bodyText="Tournament week and signals are down. Rest and recover hard \u2014 arriving fresh matters more than any session right now.";
      }
      v.innerHTML='<div class="vtop">'+
        '<div class="bigscore" style="color:'+bc+';text-shadow:0 0 30px '+bc+'66">'+today.score100+'<span class="scoreout">/100</span></div>'+
        '<div class="scoreside"><div class="vword" style="color:'+bc+'">'+VERD[today.band].w+'</div><div class="vhead">'+(tournOn?"\ud83c\udfcc\ufe0f "+VERD[today.band].h:VERD[today.band].h)+'</div></div>'+
        '</div>'+
        trendLine+
        (travelOn?'<div style="font-size:12px;color:'+C.amber+';margin-top:8px;font-weight:600">\u2708\ufe0f '+(travelMode==="long"?"Long-haul flight yesterday \u2014 worth bearing in mind when you read today\'s numbers.":"Short-haul flight yesterday \u2014 context for today\'s numbers.")+'</div>':'')+
        '<p class="vbody">'+bodyText+'</p>'+
        '<span class="conf" style="background:'+confColor+'22;color:'+confColor+'">Confidence: '+today.confidence+'</span>';
      body.appendChild(v);

      // Tournament (today) + travel (yesterday — a flight shows up in this morning's reading)
      var todayIso=today.iso;
      var yestIso=(function(){ var d=new Date(todayIso+"T00:00:00"); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
      var tog=document.createElement("div");tog.className="btnrow";
      var tb=document.createElement("button");tb.className="btn "+(tournOn?"btn-primary":"btn-ghost");
      tb.textContent=(tournOn?"\ud83c\udfcc\ufe0f Tournament day: ON":"Tournament day");
      tb.onclick=function(){ var nv=!tournOn; setFlag(todayIso,"tourn",nv?true:false); render(false); };
      tog.appendChild(tb);body.appendChild(tog);

      // travel YESTERDAY: none / short haul / long haul
      var trow=document.createElement("div");trow.style.cssText="display:flex;gap:6px;margin-top:8px;";
      var tLab=document.createElement("span");tLab.style.cssText="font-size:12px;color:"+C.muted+";align-self:center;margin-right:2px;white-space:nowrap;";tLab.textContent="Flew yesterday";
      trow.appendChild(tLab);
      [["","No"],["short","\u2708\ufe0f Short"],["long","\u2708\ufe0f Long"]].forEach(function(o){
        var b=document.createElement("button");
        b.className="btn "+((travelMode||"")===o[0]?"btn-primary":"btn-ghost");
        b.style.cssText="padding:7px 12px;font-size:12.5px;flex:1;";
        b.textContent=o[1];
        b.onclick=function(){ setFlag(yestIso,"travel",o[0]||false); render(false); };
        trow.appendChild(b);
      });
      body.appendChild(trow);

      // free-text note for today
      var nWrap=document.createElement("div");nWrap.className="card";nWrap.style.marginTop="12px";
      var nLab=document.createElement("div");nLab.style.cssText="font-size:12px;color:"+C.muted+";margin-bottom:6px;";nLab.textContent="Notes for today";
      var nTa=document.createElement("textarea");
      nTa.value=getNote(todayIso);
      nTa.placeholder="Anything worth remembering \u2014 how you felt, what you did, sleep, travel, niggles\u2026";
      nTa.style.cssText="width:100%;min-height:74px;background:"+C.panel2+";color:"+C.ink+";border:1px solid "+C.line+";border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:vertical;";
      var nRow=document.createElement("div");nRow.className="btnrow";nRow.style.marginTop="8px";
      var nSave=document.createElement("button");nSave.className="btn btn-primary";nSave.style.cssText="padding:8px 16px;font-size:13px;";nSave.textContent="Save note";
      nSave.onclick=function(){ setNote(todayIso,nTa.value); nSave.textContent="Saved \u2713"; };
      nRow.appendChild(nSave);
      nWrap.appendChild(nLab);nWrap.appendChild(nTa);nWrap.appendChild(nRow);
      body.appendChild(nWrap);

      var rc=document.createElement("div");rc.className="reason";rc.innerHTML='<h3>Why this signal</h3>';
      if(today.reasons.length){ today.reasons.forEach(function(r){
        var cls=r.dir==="up"?"rup":r.dir==="down"?"rdown":r.dir==="warn"?"rwarn":"rflat";
        var ico=r.dir==="up"?"\u25b2":r.dir==="down"?"\u25bc":r.dir==="warn"?"\u26a0":"\u2022";
        var line=document.createElement("div");line.className="rline";
        line.innerHTML='<span class="rico '+cls+'">'+ico+'</span><span>'+r.txt+'</span>';rc.appendChild(line);});
      } else { var e=document.createElement("div");e.className="rline";e.textContent="Not enough context yet to explain \u2014 add more history.";rc.appendChild(e); }
      body.appendChild(rc);

      var st=document.createElement("div");st.className="stats";
      function stat(l,val,sub,src,col){return '<div class="stat"><div class="slabel">'+l+'</div><div class="svalue" style="color:'+(col||C.ink)+'">'+val+'</div>'+(sub?'<div class="ssub">'+sub+'</div>':'')+(src?'<div class="ssrc">'+src+'</div>':'')+'</div>';}
      st.innerHTML=stat("HRV",today.hrv!=null?today.hrv.toFixed(1):"\u2014",today.hBase?("base "+today.hBase.toFixed(0)):"",today.hrvSrc||"",C.hrv)+
        stat("Resting HR",today.rhr!=null?today.rhr:"\u2014",today.rBase?("base "+today.rBase.toFixed(0)):"",today.hrvSrc==="360HP"&&today.hp_rhr!=null?"360HP":(today.o_rhr!=null?"Oura":""))+
        stat("Subjective",today.hp_subjective!=null?today.hp_subjective:"\u2014","/ 10",today.hp_subjective!=null?"360HP":"")+
        stat("Oura readiness",today.o_readiness!=null?today.o_readiness:"\u2014","/ 100",today.o_readiness!=null?"Oura":"")+
        stat("Oura sleep",today.o_sleepscore!=null?today.o_sleepscore:"\u2014","/ 100",today.o_sleepscore!=null?"Oura":"")+
        stat("Readiness","<span style='color:"+bc+"'>"+today.score100+"</span>","/ 100","",bc);
      body.appendChild(st);

      var btns=document.createElement("div");btns.className="btnrow";
      var b1=document.createElement("button");b1.className="btn btn-primary";b1.textContent="Update 360HP CSV";b1.onclick=function(){fileInput.click();};
      var bx=document.createElement("button");bx.className="btn btn-ghost";bx.textContent="Export my data";bx.onclick=function(){exportMyData(model);};
      var b2=document.createElement("button");b2.className="btn btn-ghost";b2.textContent="Clear all data";b2.onclick=function(){if(confirm("Clear 360HP history and Oura cache from this device?")){localStorage.removeItem(K_ROWS);localStorage.removeItem(K_OURA);localStorage.removeItem(K_OURATIME);render(false);}};
      btns.appendChild(b1);btns.appendChild(bx);btns.appendChild(b2);body.appendChild(btns);
      var xnote=document.createElement("div");xnote.className="cnote";xnote.style.cssText="text-align:center;margin-top:-4px;color:"+C.muted+";";
      xnote.textContent="Export saves the parts that only exist in this app \u2014 your readiness scores, tournament/travel flags and bar velocities.";
      body.appendChild(xnote);
    }
    else if(TAB==="trends") buildTrends(body,fmodel);
    else if(TAB==="compare") buildCompare(body,fmodel);
    else if(TAB==="history") buildHistory(body,fmodel);
    else if(TAB==="training") buildTraining(body,model);
    else if(TAB==="oura") buildOura(body,fmodel);
    else if(TAB==="gymtrends") buildGymTrends(body);
    else if(TAB==="hp360") buildHP360(body,fmodel);
    else if(TAB==="insights") buildInsights(body,fmodel);

    var foot=document.createElement("div");foot.className="foot";
    foot.textContent="Signal, not diagnosis. This fuses trends across your own data to suggest how hard to go \u2014 it doesn't replace how you actually feel or medical advice. When your two sources disagree, it tells you and leans cautious.";
    app.appendChild(foot);
    // Scroll behaviour: jump to top only when the tab actually changes.
    // For in-tab re-renders (expanding a history day, dropdowns, toggles) keep position.
    if(typeof window!=="undefined"&&window.scrollTo){
      if(PREVTAB!==TAB){ window.scrollTo(0,0); }
      else { window.scrollTo(0,keepScroll); }
    }
    PREVTAB=TAB;
  }

  // initial render, then auto-sync Oura once on load if we have a URL
  try{
    render(false);
    if(WORKER_URL && WORKER_URL.indexOf("http")===0){
      ouraStatus={state:"loading",msg:""};
      // reflect loading state without full re-render flash: only if today exists
      fetchOura(function(res){ ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"}; render(false); });
    }
  }catch(err){ fail("Something went wrong starting the app: "+err.message); }
})();
</script>
</body>
</html>
