<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Readiness</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#04141A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Readiness" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/chart.js@4.4.3/dist/chart.umd.js"></script>

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #04141A;
    background-image: radial-gradient(120% 80% at 50% -10%, #0A2A34 0%, #061C24 42%, #04141A 100%);
    background-attachment: fixed;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    color: #DCEEF0;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: clamp(16px,4vw,40px); }
  .mono { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  .head { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
  .title { font-family:'Fraunces',serif; font-size:clamp(28px,7vw,40px); font-weight:600; letter-spacing:-0.02em; text-shadow:0 0 24px rgba(61,224,200,0.25); }
  .sub { color:#6E9AA0; font-size:14px; margin-top:2px; }
  .latest { text-align:right; font-size:13px; color:#6E9AA0; }
  .latest b { color:#DCEEF0; font-size:15px; font-weight:500; }

  .verdict { border-radius:18px; padding:clamp(20px,4vw,32px); margin-bottom:20px; }
  .vtop { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .dot { width:64px; height:64px; border-radius:50%; flex-shrink:0; }
  .vword { font-variant-numeric:tabular-nums; font-size:12px; letter-spacing:0.14em; font-weight:600; }
  .vhead { font-family:'Fraunces',serif; font-size:clamp(26px,6vw,34px); font-weight:600; line-height:1.1; }
  .vbody { font-size:15px; line-height:1.6; margin:16px 0 0; max-width:560px; }
  .vreason { margin-top:14px; padding:10px 14px; background:rgba(4,20,26,0.55); border-radius:10px; font-size:13.5px; line-height:1.5; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:28px; }
  .stat { background:#0A2028; border:1px solid #123845; border-radius:12px; padding:14px 16px; }
  .slabel { font-size:11.5px; color:#6E9AA0; text-transform:uppercase; letter-spacing:0.06em; }
  .svalue { font-size:26px; font-weight:600; margin-top:4px; font-family:'Fraunces',serif; font-variant-numeric:tabular-nums; }
  .ssub { font-size:12px; color:#6E9AA0; margin-top:2px; font-variant-numeric:tabular-nums; }

  .card { background:#0A2028; border:1px solid #123845; border-radius:14px; padding:18px; margin-bottom:16px; box-shadow:0 1px 0 rgba(61,224,200,0.04) inset; }
  .ctitle { font-family:'Fraunces',serif; font-size:17px; font-weight:600; }
  .cnote { color:#6E9AA0; font-size:12.5px; margin:2px 0 12px; line-height:1.5; }
  .cwrap { position:relative; width:100%; }

  .btn { border:none; border-radius:8px; padding:10px 18px; font-size:14px; font-weight:600; }
  .btn-primary { background:#3DE0C8; color:#04141A; box-shadow:0 0 20px -6px #3DE0C8; }
  .btn-ghost { background:transparent; color:#6E9AA0; border:1px solid #123845; font-weight:400; }

  .panel { background:#0A2028; border:1px solid #123845; border-radius:16px; padding:28px; }
  .foot { margin-top:32px; color:#6E9AA0; font-size:12px; line-height:1.6; border-top:1px solid #123845; padding-top:16px; }
  input[type=password]{ width:100%; padding:10px 12px; border-radius:8px; border:1px solid #123845; background:#0E2A34; color:#DCEEF0; font-size:14px; }
  #boot { padding:40px 24px; color:#6E9AA0; font-size:14px; }
  .saved { background:#0E3A38; color:#2FE6B0; font-size:13px; padding:8px 12px; border-radius:8px; margin-bottom:16px; border:1px solid #2FE6B044; }
  .err { color:#FF6B6B; font-size:13px; margin-top:14px; }
</style>
</head>
<body>
<div class="wrap" id="app"><div id="boot">Loading…</div></div>

<script>
(function(){
  "use strict";
  var boot=document.getElementById("boot");
  function fail(m){ if(boot) boot.textContent=m; }

  var C={ bg:"#04141A",panel:"#0A2028",panel2:"#0E2A34",line:"#123845",ink:"#DCEEF0",muted:"#6E9AA0",
    glow:"#3DE0C8",green:"#2FE6B0",greenSoft:"#0E3A38",amber:"#E8B65A",amberSoft:"#3A3018",
    red:"#FF6B6B",redSoft:"#3A1C22",hrv:"#57C7FF",hrvBand:"rgba(87,199,255,0.14)",r7:"#2FE6B0",r30:"#8A7DFF" };
  var STORAGE_KEY="readiness_360hp_rows_v1";

  // ---------- helpers ----------
  function parseCSV(t){ var L=t.trim().split(/\r?\n/); var H=L[0].split(",").map(function(h){return h.trim();});
    return L.slice(1).map(function(l){ var p=l.split(","); var o={}; H.forEach(function(h,i){o[h]=(p[i]!=null?p[i]:"").trim();}); return o; }); }
  function pDate(s){ var p=s.split("-").map(Number); return new Date(p[2],p[1]-1,p[0]); }
  function fmt(d){ return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"}); }
  function median(a){ if(!a.length)return null; var s=a.slice().sort(function(x,y){return x-y;}); var m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
  function mean(a){ if(!a.length)return null; return a.reduce(function(x,y){return x+y;},0)/a.length; }
  function stdev(a){ if(a.length<2)return null; var m=mean(a); return Math.sqrt(mean(a.map(function(v){return (v-m)*(v-m);}))); }
  function pearson(xs,ys){ var n=xs.length; if(n<4)return null; var mx=mean(xs),my=mean(ys),nu=0,dx=0,dy=0;
    for(var i=0;i<n;i++){var a=xs[i]-mx,b=ys[i]-my;nu+=a*b;dx+=a*a;dy+=b*b;} if(!dx||!dy)return null; return nu/Math.sqrt(dx*dy); }
  function r1(v){ return v==null?null:Math.round(v*10)/10; }

  // ---------- model ----------
  function buildModel(rows){
    var data=rows.filter(function(r){return r.date&&r.rMSSD;}).map(function(r){
      return { date:pDate(r.date),dateStr:r.date,hrv:parseFloat(r.rMSSD),
        rhr:r.RHR?parseFloat(r.RHR):null,subjective:r.subjective?parseFloat(r.subjective):null,
        sleep:r.sleep?parseFloat(r.sleep):null,energy:r.energy?parseFloat(r.energy):null,
        tags:(r.tags||"").trim(),note:(r.note||"").trim() };
    }).sort(function(a,b){return a.date-b.date;});
    var W=7, flags=["pain","fatigue","ill","sick","injur","lock"];
    return data.map(function(row,i){
      var prior=data.slice(Math.max(0,i-W),i);
      var hp=prior.map(function(p){return p.hrv;}).filter(isFinite);
      var rp=prior.map(function(p){return p.rhr;}).filter(isFinite);
      var hBase=hp.length>=3?median(hp):null, rBase=rp.length>=3?median(rp):null, hSd=hp.length>=3?stdev(hp):null;
      var hDev=hBase?(row.hrv-hBase)/hBase:null;
      var w7=data.slice(Math.max(0,i-6),i+1).map(function(p){return p.hrv;}).filter(isFinite);
      var w30=data.slice(Math.max(0,i-29),i+1).map(function(p){return p.hrv;}).filter(isFinite);
      var roll7=w7.length>=3?mean(w7):null, roll30=w30.length>=5?mean(w30):null;
      var hs=0,rs=0,ss=0;
      if(hDev!==null)hs=Math.max(-1,Math.min(1,hDev/0.15));
      if(rBase&&row.rhr){var rd=(row.rhr-rBase)/rBase;rs=Math.max(-1,Math.min(1,-rd/0.08));}
      if(row.subjective!==null)ss=Math.max(-1,Math.min(1,(row.subjective-7.5)/2));
      var wH=hDev!==null?0.55:0,wS=row.subjective!==null?0.30:0,wR=(rBase&&row.rhr)?0.15:0,sum=wH+wS+wR||1;
      var comp=(hs*wH+ss*wS+rs*wR)/sum;
      var text=(row.tags+" "+row.note).toLowerCase(), ov=null;
      if(flags.some(function(w){return text.indexOf(w)>=0;})){comp=Math.min(comp,-0.5);ov="flag";}
      var band=comp>=0.15?"green":(comp>=-0.2?"yellow":"red");
      return Object.assign({},row,{hBase:hBase,rBase:rBase,hSd:hSd,hDev:hDev,roll7:roll7,roll30:roll30,comp:comp,band:band,ov:ov,has:hBase!==null});
    });
  }

  function reasonFor(d){
    if(!d.has) return "Not enough history yet to set your baseline — need ~3 prior days.";
    var b=[],pct=Math.round(d.hDev*100);
    if(pct>=8)b.push("HRV "+pct+"% above your 7-day baseline");
    else if(pct<=-8)b.push("HRV "+Math.abs(pct)+"% below baseline");
    else b.push("HRV close to baseline ("+(pct>=0?"+":"")+pct+"%)");
    if(d.subjective!=null){ if(d.subjective>=8.5)b.push("strong subjective read"); else if(d.subjective<=7)b.push("subjective read is low"); }
    if(d.rBase&&d.rhr){ var rd=Math.round(d.rhr-d.rBase); if(rd>=4)b.push("resting HR up "+rd+" bpm"); else if(rd<=-3)b.push("resting HR down "+Math.abs(rd)+" bpm"); }
    if(d.ov==="flag")b.push("flagged: "+(d.tags||"note"));
    return b.join(" · ");
  }
  function corrWord(r){ var a=Math.abs(r); var s=a<0.2?"essentially no link":a<0.4?"a weak link":a<0.6?"a moderate link":"a strong link";
    var dir=r>=0?"better sleep tends to mean higher HRV":"higher sleep scores track lower HRV here"; return s+" ("+dir+")"; }

  var VERD={ green:{w:"GREEN",h:"Push",b:"Body's ready. Good day for a hard session or heavy practice load."},
    yellow:{w:"YELLOW",h:"Moderate",b:"Middle ground. Technical work, skills, or a moderate session — leave the max effort for a green day."},
    red:{w:"RED",h:"Recover",b:"Signals are down. Rest, mobility, or light recovery. Pushing today digs the hole deeper."} };

  // ---------- chart factory ----------
  var CHARTS=[];
  function destroyCharts(){ CHARTS.forEach(function(c){try{c.destroy();}catch(e){}}); CHARTS=[]; }
  var haveChart = (typeof window.Chart !== "undefined");

  function baseOpts(extra){
    var o={ responsive:true, maintainAspectRatio:false, interaction:{intersect:false,mode:"index"},
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:C.panel2, borderColor:C.line, borderWidth:1, titleColor:C.muted, bodyColor:C.ink } },
      scales:{ x:{ grid:{color:C.line,drawTicks:false}, ticks:{color:C.muted,maxRotation:0,autoSkip:true,maxTicksLimit:6}, border:{color:C.line} },
               y:{ grid:{color:C.line,drawTicks:false}, ticks:{color:C.muted}, border:{display:false} } } };
    if(extra) deepMerge(o,extra); return o;
  }
  function deepMerge(t,s){ for(var k in s){ if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){ t[k]=t[k]||{}; deepMerge(t[k],s[k]); } else t[k]=s[k]; } return t; }

  function mkCanvas(parent,h){ var w=document.createElement("div"); w.className="cwrap"; w.style.height=h+"px";
    var cv=document.createElement("canvas"); w.appendChild(cv); parent.appendChild(w); return cv; }
  function card(title,note){ var d=document.createElement("div"); d.className="card";
    var t=document.createElement("div"); t.className="ctitle"; t.textContent=title; d.appendChild(t);
    if(note){ var n=document.createElement("div"); n.className="cnote"; n.textContent=note; d.appendChild(n);} return d; }

  function renderCharts(container, model){
    destroyCharts();
    var rowsB=model.filter(function(d){return d.has;});
    var labels=rowsB.map(function(d){return fmt(new Date(d.date));});

    if(!haveChart){
      var c=document.createElement("div"); c.className="card";
      c.style.color=C.muted; c.style.fontSize="13px"; c.style.lineHeight="1.6";
      c.textContent="Charts didn't load this time. Your verdict and numbers above are correct — pull down to refresh and the graphs should appear.";
      container.appendChild(c); return;
    }

    Chart.defaults.font.family="Inter, system-ui, sans-serif";
    Chart.defaults.color=C.muted;

    // 1. HRV vs baseline
    (function(){ var cd=card("HRV vs your rolling baseline","Moonlit line is daily HRV; dashed is your 7-day baseline. Distance from it drives the score.");
      var cv=mkCanvas(cd,240); container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:[
        {label:"HRV",data:rowsB.map(function(d){return r1(d.hrv);}),borderColor:C.hrv,backgroundColor:C.hrv,borderWidth:2.4,pointRadius:0,tension:0.3},
        {label:"baseline",data:rowsB.map(function(d){return r1(d.hBase);}),borderColor:C.muted,borderWidth:1,borderDash:[4,3],pointRadius:0,tension:0.3}
      ]},options:baseOpts()})); })();

    // 2. HRV + variability band
    (function(){ var cd=card("HRV trend with variability band","Shaded band is your normal day-to-day swing (±1 SD around baseline). Inside = normal noise; breaking below = a real dip worth respecting.");
      var cv=mkCanvas(cd,240); container.appendChild(cd);
      var up=rowsB.map(function(d){return (d.hBase!=null&&d.hSd!=null)?r1(d.hBase+d.hSd):null;});
      var lo=rowsB.map(function(d){return (d.hBase!=null&&d.hSd!=null)?r1(d.hBase-d.hSd):null;});
      CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:[
        {label:"band upper",data:up,borderColor:"transparent",backgroundColor:C.hrvBand,pointRadius:0,fill:"+1"},
        {label:"band lower",data:lo,borderColor:"transparent",backgroundColor:C.hrvBand,pointRadius:0,fill:false},
        {label:"HRV",data:rowsB.map(function(d){return r1(d.hrv);}),borderColor:C.hrv,borderWidth:2.4,pointRadius:0,tension:0.3}
      ]},options:baseOpts()})); })();

    // 3. rolling 7 vs 30
    (function(){ var cd=card("Rolling 7-day vs 30-day HRV","When the fast (7-day) line drops below the slow (30-day) line, fatigue is building before you feel it. Climbing back above = absorbing load well.");
      var cv=mkCanvas(cd,220); container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:[
        {label:"7-day",data:rowsB.map(function(d){return r1(d.roll7);}),borderColor:C.r7,borderWidth:2.4,pointRadius:0,tension:0.35},
        {label:"30-day",data:rowsB.map(function(d){return r1(d.roll30);}),borderColor:C.r30,borderWidth:2.4,pointRadius:0,tension:0.35}
      ]},options:baseOpts({plugins:{legend:{display:true,labels:{color:C.muted,boxWidth:12,usePointStyle:true}}}})})); })();

    // 4. daily score (colored bars)
    (function(){ var cd=card("Daily score","Composite readiness, −100 to +100. Green ≥ 15, red ≤ −20.");
      var cv=mkCanvas(cd,200); container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"bar",data:{labels:labels,datasets:[
        {label:"score",data:rowsB.map(function(d){return Math.round(d.comp*100);}),backgroundColor:rowsB.map(function(d){return C[d.band];}),borderRadius:3}
      ]},options:baseOpts({scales:{y:{min:-100,max:100}}})})); })();

    // 5. sleep vs HRV scatter
    (function(){ var pts=model.filter(function(d){return d.sleep!=null&&isFinite(d.hrv);}).map(function(d){return {x:d.sleep,y:r1(d.hrv)};});
      var r=null; if(pts.length>=4){ r=pearson(pts.map(function(p){return p.x;}),pts.map(function(p){return p.y;})); }
      var note=r!=null?("Each dot is a day: sleep quality (x) vs same-day HRV (y). Correlation r = "+r.toFixed(2)+" — "+corrWord(r)+"."):"Each dot is a day: sleep quality (x) vs same-day HRV (y). Need a few more days to compute the correlation.";
      var cd=card("Does sleep predict your HRV?",note); var cv=mkCanvas(cd,240); container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"scatter",data:{datasets:[{label:"day",data:pts,backgroundColor:C.glow,pointRadius:4,pointHoverRadius:6}]},
        options:baseOpts({scales:{x:{min:0.5,max:4.5,ticks:{stepSize:1},title:{display:true,text:"sleep score",color:C.muted}},y:{title:{display:true,text:"HRV",color:C.muted}}}})})); })();

    // 6. subjective vs RHR (dual axis)
    (function(){ var cd=card("Subjective vs resting HR","Morning subjective score against resting heart rate.");
      var cv=mkCanvas(cd,200); container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:[
        {label:"subjective",data:rowsB.map(function(d){return d.subjective;}),borderColor:C.green,borderWidth:2,pointRadius:0,tension:0.3,yAxisID:"y"},
        {label:"resting HR",data:rowsB.map(function(d){return d.rhr;}),borderColor:C.red,borderWidth:2,pointRadius:0,tension:0.3,yAxisID:"y1"}
      ]},options:baseOpts({plugins:{legend:{display:true,labels:{color:C.muted,boxWidth:12,usePointStyle:true}}},
        scales:{y:{min:5,max:10,position:"left"},y1:{min:45,max:85,position:"right",grid:{drawOnChartArea:false}}}})})); })();
  }

  // ---------- render app ----------
  var app=document.getElementById("app");
  function getRows(){ try{ var s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
  function saveRows(r){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(r)); }catch(e){} }

  function render(savedFlash){
    var rows=getRows();
    var model=rows?buildModel(rows):null;
    var today=(model&&model.length)?model[model.length-1]:null;
    app.innerHTML="";

    var head=document.createElement("div"); head.className="head";
    head.innerHTML='<div><div class="title">Readiness</div><div class="sub">HRV-led daily training signal</div></div>'+
      (today?'<div class="latest">Latest reading<br><b class="mono">'+today.dateStr+'</b></div>':'');
    app.appendChild(head);

    var fileInput=document.createElement("input"); fileInput.type="file"; fileInput.accept=".csv"; fileInput.style.display="none";
    fileInput.addEventListener("change",function(ev){ var f=ev.target.files&&ev.target.files[0]; if(!f)return;
      var rd=new FileReader(); rd.onload=function(x){ try{ var p=parseCSV(x.target.result);
        if(!p.length||!("rMSSD" in p[0])){ alert("That file doesn't look like a 360HP export — no rMSSD column found."); return; }
        saveRows(p); render(true);
      }catch(e){ alert("Couldn't read that file. Make sure it's the raw 360HP CSV export."); } };
      rd.readAsText(f); });
    app.appendChild(fileInput);

    if(savedFlash){ var sv=document.createElement("div"); sv.className="saved"; sv.textContent="Saved to this device — your history will be here next time you open the app."; app.appendChild(sv);
      setTimeout(function(){ if(sv.parentNode) sv.parentNode.removeChild(sv); },2600); }

    if(today){
      var bc=C[today.band], bs=C[today.band+"Soft"];
      var v=document.createElement("div"); v.className="verdict";
      v.style.background=bs; v.style.border="1px solid "+bc+"55"; v.style.boxShadow="0 0 40px -12px "+bc+"66";
      v.innerHTML='<div class="vtop"><div class="dot" style="background:'+bc+';box-shadow:0 0 24px 2px '+bc+'aa,0 0 0 6px '+bc+'22"></div>'+
        '<div><div class="vword" style="color:'+bc+'">'+VERD[today.band].w+'</div><div class="vhead">'+VERD[today.band].h+'</div></div></div>'+
        '<p class="vbody">'+VERD[today.band].b+'</p>'+
        '<div class="vreason">'+reasonFor(today)+'</div>';
      app.appendChild(v);

      var st=document.createElement("div"); st.className="stats";
      function stat(l,val,sub,col){ return '<div class="stat"><div class="slabel">'+l+'</div><div class="svalue" style="color:'+(col||C.ink)+'">'+val+'</div>'+(sub?'<div class="ssub">'+sub+'</div>':'')+'</div>'; }
      st.innerHTML = stat("HRV (rMSSD)",today.hrv.toFixed(1),today.hBase?("base "+today.hBase.toFixed(0)):"",C.hrv)+
        stat("Resting HR",today.rhr!=null?today.rhr:"—",today.rBase?("base "+today.rBase.toFixed(0)):"")+
        stat("Subjective",today.subjective!=null?today.subjective:"—","/ 10")+
        stat("Score",Math.round(today.comp*100),"−100…100",bc);
      app.appendChild(st);

      var charts=document.createElement("div"); app.appendChild(charts);
      renderCharts(charts, model);

      var btns=document.createElement("div"); btns.style.cssText="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;";
      var b1=document.createElement("button"); b1.className="btn btn-primary"; b1.textContent="Update with new CSV"; b1.onclick=function(){fileInput.click();};
      var b2=document.createElement("button"); b2.className="btn btn-ghost"; b2.textContent="Clear data"; b2.onclick=function(){ if(confirm("Clear saved history from this device?")){ localStorage.removeItem(STORAGE_KEY); render(false); } };
      btns.appendChild(b1); btns.appendChild(b2); app.appendChild(btns);
    } else {
      var p=document.createElement("div"); p.className="panel";
      p.innerHTML='<div class="ctitle">Get started</div><p class="cnote" style="font-size:14px">Import your 360HP CSV to generate today\'s signal. Your HRV (rMSSD) is the primary driver, scored against your own 7-day rolling baseline. Once imported, your history is saved on this device.</p>';
      var b=document.createElement("button"); b.className="btn btn-primary"; b.style.padding="12px 20px"; b.style.fontSize="15px"; b.textContent="Import 360HP CSV"; b.onclick=function(){fileInput.click();};
      p.appendChild(b);
      var o=document.createElement("div"); o.style.cssText="margin-top:28px;padding-top:22px;border-top:1px solid "+C.line+";";
      o.innerHTML='<div style="font-size:14px;font-weight:600;margin-bottom:6px">Oura live pull <span style="color:'+C.amber+';font-weight:500">— coming next</span></div>'+
        '<p class="cnote">Paste your Oura Personal Access Token to save it for when live pull is wired up. Browsers can\'t call the Oura API directly, so this needs a small relay — the next step. Token stays on this device only.</p>'+
        '<input type="password" placeholder="Oura personal access token">';
      p.appendChild(o); app.appendChild(p);
    }

    var foot=document.createElement("div"); foot.className="foot";
    foot.textContent="Signal, not diagnosis. This reads trends in your own data to suggest how hard to go — it doesn't replace how you actually feel or medical advice. A red day when you feel great is worth a second look; a green day when you feel ill is not a licence to push.";
    app.appendChild(foot);
  }

  try{ render(false); }
  catch(err){ fail("Something went wrong starting the app: "+err.message); }
})();
</script>
</body>
</html>
