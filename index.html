<style>
  :root{ color-scheme:dark; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#04141A;
    background-image:radial-gradient(120% 80% at 50% -10%, #0A2A34 0%, #061C24 42%, #04141A 100%);
    background-attachment:fixed;
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    color:#DCEEF0;
  }
  .wrap{max-width:860px;margin:0 auto;padding:clamp(16px,4vw,40px);}
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
  .title{font-family:'Fraunces',serif;font-size:clamp(28px,7vw,40px);font-weight:600;letter-spacing:-0.02em;text-shadow:0 0 24px rgba(61,224,200,0.25);}
  .sub{color:#6E9AA0;font-size:14px;margin-top:2px;}
  .latest{text-align:right;font-size:13px;color:#6E9AA0;}
  .latest b{color:#DCEEF0;font-size:15px;font-weight:500;}

  .verdict{border-radius:18px;padding:clamp(20px,4vw,32px);margin-bottom:16px;}
  .vtop{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .dot{width:64px;height:64px;border-radius:50%;flex-shrink:0;}
  .vword{font-variant-numeric:tabular-nums;font-size:12px;letter-spacing:0.14em;font-weight:600;}
  .vhead{font-family:'Fraunces',serif;font-size:clamp(26px,6vw,34px);font-weight:600;line-height:1.1;}
  .vbody{font-size:15px;line-height:1.6;margin:16px 0 0;max-width:560px;}
  .conf{display:inline-block;margin-top:14px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:0.04em;}
  .bigscore{font-family:'Fraunces',serif;font-size:clamp(58px,16vw,88px);font-weight:600;line-height:0.95;font-variant-numeric:tabular-nums;}
  .scoreout{font-size:18px;font-weight:600;opacity:0.5;}
  .scoreside{display:flex;flex-direction:column;justify-content:center;}

  .reason{background:#0A2028;border:1px solid #123845;border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .reason h3{margin:0 0 10px;font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:#DCEEF0;}
  .rline{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #0E2A34;font-size:13.5px;line-height:1.5;}
  .rline:last-child{border-bottom:none;}
  .rico{flex-shrink:0;width:18px;text-align:center;}
  .rup{color:#2FE6B0;} .rdown{color:#FF6B6B;} .rflat{color:#6E9AA0;} .rwarn{color:#E8B65A;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:12px;margin-bottom:16px;}
  .stat{background:#0A2028;border:1px solid #123845;border-radius:12px;padding:14px 16px;}
  .slabel{font-size:11px;color:#6E9AA0;text-transform:uppercase;letter-spacing:0.05em;}
  .svalue{font-size:24px;font-weight:600;margin-top:4px;font-family:'Fraunces',serif;font-variant-numeric:tabular-nums;}
  .ssub{font-size:11.5px;color:#6E9AA0;margin-top:2px;font-variant-numeric:tabular-nums;}
  .ssrc{font-size:10px;color:#3D6B74;margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;}

  .card{background:#0A2028;border:1px solid #123845;border-radius:14px;padding:18px;margin-bottom:16px;}
  .ctitle{font-family:'Fraunces',serif;font-size:17px;font-weight:600;}
  .cnote{color:#6E9AA0;font-size:12.5px;margin:2px 0 12px;line-height:1.5;}
  .cwrap{position:relative;width:100%;}

  .btn{border:none;border-radius:8px;padding:11px 18px;font-size:14px;font-weight:600;}
  .btn-primary{background:#3DE0C8;color:#04141A;box-shadow:0 0 20px -6px #3DE0C8;}
  .btn-ghost{background:transparent;color:#6E9AA0;border:1px solid #123845;font-weight:400;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px;}

  .sync{display:flex;align-items:center;gap:10px;background:#0A2028;border:1px solid #123845;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#6E9AA0;}
  .sync .dotlive{width:8px;height:8px;border-radius:50%;background:#2FE6B0;box-shadow:0 0 8px #2FE6B0;flex-shrink:0;}
  .sync .dotoff{width:8px;height:8px;border-radius:50%;background:#E8B65A;flex-shrink:0;}
  .sync .doterr{width:8px;height:8px;border-radius:50%;background:#FF6B6B;flex-shrink:0;}

  .panel{background:#0A2028;border:1px solid #123845;border-radius:16px;padding:28px;}
  .foot{margin-top:24px;color:#6E9AA0;font-size:12px;line-height:1.6;border-top:1px solid #123845;padding-top:16px;}
  input[type=password],input[type=text]{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #123845;background:#0E2A34;color:#DCEEF0;font-size:15px;}
  label{font-size:13px;font-weight:600;color:#DCEEF0;display:block;margin-bottom:6px;}
  #boot{padding:40px 24px;color:#6E9AA0;font-size:14px;}
  .saved{background:#0E3A38;color:#2FE6B0;font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:16px;border:1px solid #2FE6B044;}
  .err{color:#FF6B6B;font-size:13px;margin-top:10px;}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:2px 7px;border-radius:6px;margin-left:8px;vertical-align:middle;}
  .tag-360{background:#12384522;color:#57C7FF;border:1px solid #57C7FF44;}
  .tag-oura{background:#2FE6B01a;color:#2FE6B0;border:1px solid #2FE6B044;}

  /* tabs */
  .tabbar{position:sticky;top:0;z-index:30;display:flex;gap:4px;overflow-x:auto;background:rgba(4,20,26,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:10px 0 8px;margin:0 0 16px;border-bottom:1px solid #123845;scrollbar-width:none;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tabbtn{flex:0 0 auto;background:transparent;border:1px solid #123845;color:#6E9AA0;border-radius:999px;padding:8px 15px;font-size:13px;font-weight:600;white-space:nowrap;}
  .tabbtn.active{background:#0E2A34;color:#3DE0C8;border-color:#3DE0C844;box-shadow:0 0 16px -6px #3DE0C8;}
  .mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;margin-bottom:14px;}
  .minicard{background:#0A2028;border:1px solid #123845;border-radius:10px;padding:10px 12px;}
  .minicard .l{font-size:10px;color:#6E9AA0;text-transform:uppercase;letter-spacing:0.05em;}
  .minicard .v{font-size:19px;font-weight:600;font-family:'Fraunces',serif;margin-top:3px;font-variant-numeric:tabular-nums;}
  .needsync{background:#0A2028;border:1px dashed #2FE6B044;border-radius:12px;padding:16px;color:#6E9AA0;font-size:12.5px;line-height:1.5;margin-bottom:16px;}
  .weekrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #0E2A34;font-size:13.5px;}
  .weekrow:last-child{border-bottom:none;}
  .chip{display:inline-block;width:12px;height:12px;border-radius:3px;margin-left:3px;}
  .insight{background:#0A2028;border:1px solid #123845;border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:13.5px;line-height:1.55;}
  .insight b{color:#DCEEF0;}
  .histrow{display:flex;align-items:center;gap:14px;background:#0A2028;border:1px solid #123845;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
  .histrow:active{background:#0E2A34;}
  .histscore{font-family:'Fraunces',serif;font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;min-width:44px;text-align:center;}
  .histmid{flex:1;min-width:0;}
  .histdate{font-size:14px;font-weight:700;color:#DCEEF0;}
  .histword{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
  .histmeta{font-size:11.5px;color:#6E9AA0;margin-top:2px;font-variant-numeric:tabular-nums;}
  .histexp{background:#0A2028;border:1px solid #123845;border-top:none;border-radius:0 0 12px 12px;margin:-8px 0 8px;padding:12px 14px;}
  .histexp .rline{border-bottom-color:#0E2A34;}
  .chkbox{width:24px;height:24px;border-radius:7px;border:2px solid #3DE0C8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .chkbox.on{background:#2FE6B0;border-color:#2FE6B0;}
  .chkbox.on::after{content:"\2713";color:#04141A;font-weight:800;font-size:15px;}
</style>

<body>
<div class="wrap" id="app"><div id="boot">Loading…</div></div>

<script>
(function(){
  "use strict";
  var boot=document.getElementById("boot");
  function fail(m){ if(boot) boot.textContent=m; }

  var C={ bg:"#04141A",panel:"#0A2028",panel2:"#0E2A34",line:"#123845",ink:"#DCEEF0",muted:"#6E9AA0",
    glow:"#3DE0C8",green:"#2FE6B0",greenSoft:"#0E3A38",amber:"#E8B65A",amberSoft:"#3A3018",
    red:"#FF6B6B",redSoft:"#3A1C22",hrv:"#57C7FF",hrvBand:"rgba(87,199,255,0.14)",r7:"#2FE6B0",r30:"#8A7DFF",oura:"#2FE6B0",temp:"#E8B65A" };

  // ==== YOUR RELAY ADDRESS ====
  var WORKER_URL="https://shiny-wind-c11d.mattfitzpatrick1994.workers.dev/";
  var GYM_URL="https://script.google.com/macros/s/AKfycbyIgdhH7JNT5N915Lj1UTbetvNieTz6JdcXV8vDygxwCY4hr5txxN7YDrxynEnzl-xp/exec";

  var K_ROWS="readiness_360hp_rows_v1", K_OURA="readiness_oura_cache_v1", K_OURATIME="readiness_oura_time_v1";
  var K_GYM="readiness_gym_cache_v1", K_GYMTIME="readiness_gym_time_v1", K_GYMSEL="readiness_gym_sel_v1";
  var K_TOURN="readiness_tournament_v1", K_LOGHIST="readiness_loghist_v1", K_TRAVEL="readiness_travel_v1";

  function get(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  function getJSON(k,f){try{var s=localStorage.getItem(k);return s?JSON.parse(s):f;}catch(e){return f;}}
  function setJSON(k,v){set(k,JSON.stringify(v));}

  // ---------- helpers ----------
  function parseCSV(t){var L=t.trim().split(/\r?\n/);var H=L[0].split(",").map(function(h){return h.trim();});
    return L.slice(1).map(function(l){var p=l.split(",");var o={};H.forEach(function(h,i){o[h]=(p[i]!=null?p[i]:"").trim();});return o;});}
  function pDate(s){var p=s.split("-").map(Number);return new Date(p[2],p[1]-1,p[0]);}       // DD-MM-YYYY (360HP)
  function isoDate(d){return d.toISOString().slice(0,10);}                                    // YYYY-MM-DD
  function fmt(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
  function median(a){if(!a.length)return null;var s=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
  function mean(a){if(!a.length)return null;return a.reduce(function(x,y){return x+y;},0)/a.length;}
  function stdev(a){if(a.length<2)return null;var m=mean(a);return Math.sqrt(mean(a.map(function(v){return (v-m)*(v-m);})));}
  function pearson(xs,ys){var n=xs.length;if(n<4)return null;var mx=mean(xs),my=mean(ys),nu=0,dx=0,dy=0;
    for(var i=0;i<n;i++){var a=xs[i]-mx,b=ys[i]-my;nu+=a*b;dx+=a*a;dy+=b*b;}if(!dx||!dy)return null;return nu/Math.sqrt(dx*dy);}
  function r1(v){return v==null?null:Math.round(v*10)/10;}

  // ---------- data fusion ----------
  // Build a per-day map keyed by YYYY-MM-DD merging 360HP rows + Oura cache.
  function fuse(){
    var rows360=getJSON(K_ROWS,null);
    var oura=getJSON(K_OURA,null); // {readiness:[],daily_sleep:[],sleep_detail:{}}
    var days={};

    if(rows360){
      rows360.forEach(function(r){
        if(!r.date||!r.rMSSD) return;
        var iso=isoDate(pDate(r.date));
        days[iso]=days[iso]||{iso:iso};
        days[iso].hp_hrv=parseFloat(r.rMSSD);
        days[iso].hp_rhr=r.RHR?parseFloat(r.RHR):null;
        days[iso].hp_subjective=r.subjective?parseFloat(r.subjective):null;
        days[iso].hp_sleep=r.sleep?parseFloat(r.sleep):null;
        days[iso].tags=(r.tags||"").trim(); days[iso].note=(r.note||"").trim();
      });
    }
    if(oura){
      (oura.readiness||[]).forEach(function(r){
        var d=days[r.day]=days[r.day]||{iso:r.day};
        d.o_readiness=r.score!=null?r.score:null;
        d.o_tempdev=r.temperature_deviation!=null?r.temperature_deviation:null;
        if(r.contributors){ d.o_hrvbal=r.contributors.hrv_balance; d.o_rhrcontrib=r.contributors.resting_heart_rate; }
      });
      (oura.daily_sleep||[]).forEach(function(r){
        var d=days[r.day]=days[r.day]||{iso:r.day};
        d.o_sleepscore=r.score!=null?r.score:null;
      });
      var det=oura.sleep_detail||{};
      Object.keys(det).forEach(function(day){
        var d=days[day]=days[day]||{iso:day};
        d.o_hrv=det[day].average_hrv;          // raw ms — comparable to 360HP
        d.o_rhr=det[day].lowest_heart_rate!=null?det[day].lowest_heart_rate:det[day].average_heart_rate;
        d.o_sleephrs=det[day].total_sleep_hours;
      });
    }
    // to sorted array
    var arr=Object.keys(days).sort().map(function(k){return days[k];});
    return arr;
  }

  // rolling-baseline signal engine with 360HP as HRV anchor + Oura fusion
  function analyze(arr){
    var W=7;
    return arr.map(function(row,i){
      var prior=arr.slice(Math.max(0,i-W),i);

      // choose HRV anchor: prefer 360HP, fall back to Oura raw HRV
      function hrvOf(d){ return d.hp_hrv!=null?d.hp_hrv:(d.o_hrv!=null?d.o_hrv:null); }
      var hrv=hrvOf(row), hrvSrc=row.hp_hrv!=null?"360HP":(row.o_hrv!=null?"Oura":null);
      var hp=prior.map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var hBase=hp.length>=3?median(hp):null, hSd=hp.length>=3?stdev(hp):null;
      var hDev=(hBase&&hrv!=null)?(hrv-hBase)/hBase:null;

      // resting HR: prefer 360HP, else Oura
      var rhr=row.hp_rhr!=null?row.hp_rhr:(row.o_rhr!=null?row.o_rhr:null);
      var rhrSrc=row.hp_rhr!=null?"360HP":(row.o_rhr!=null?"Oura":null);
      var rp=prior.map(function(d){return d.hp_rhr!=null?d.hp_rhr:d.o_rhr;}).filter(function(v){return v!=null&&isFinite(v);});
      var rBase=rp.length>=3?median(rp):null;

      // rolling avgs of HRV anchor
      var w7=arr.slice(Math.max(0,i-6),i+1).map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var w30=arr.slice(Math.max(0,i-29),i+1).map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var roll7=w7.length>=3?mean(w7):null, roll30=w30.length>=5?mean(w30):null;

      // ---- component sub-scores (-1 bad .. +1 good) ----
      var reasons=[];
      var parts=[], weights=[];

      if(hDev!==null){
        var hScore=Math.max(-1,Math.min(1,hDev/0.15));
        parts.push(hScore); weights.push(0.45);
        var pct=Math.round(hDev*100);
        reasons.push({dir:hScore>0.15?"up":hScore<-0.15?"down":"flat",
          txt:"HRV "+(pct>=0?"+":"")+pct+"% vs baseline"+(hrvSrc?" ("+hrvSrc+")":"")});
      }
      if(row.hp_subjective!=null){
        var sScore=Math.max(-1,Math.min(1,(row.hp_subjective-7.5)/2));
        parts.push(sScore); weights.push(0.28);
        reasons.push({dir:sScore>0.2?"up":sScore<-0.2?"down":"flat", txt:"Subjective "+row.hp_subjective+"/10 (360HP)"});
      }
      if(rBase&&rhr!=null){
        var rd=(rhr-rBase)/rBase; var rScore=Math.max(-1,Math.min(1,-rd/0.08));
        parts.push(rScore); weights.push(0.12);
        var rdiff=Math.round(rhr-rBase);
        if(Math.abs(rdiff)>=2) reasons.push({dir:rScore>0?"up":"down", txt:"Resting HR "+(rdiff>0?"+":"")+rdiff+" bpm"+(rhrSrc?" ("+rhrSrc+")":"")});
      }
      if(row.o_readiness!=null){
        var oScore=Math.max(-1,Math.min(1,(row.o_readiness-75)/15));
        parts.push(oScore); weights.push(0.09);
        reasons.push({dir:oScore>0.2?"up":oScore<-0.2?"down":"flat", txt:"Oura readiness "+row.o_readiness});
      }
      if(row.o_sleepscore!=null){
        var slScore=Math.max(-1,Math.min(1,(row.o_sleepscore-75)/18));
        parts.push(slScore); weights.push(0.06);
        if(row.o_sleepscore<70||row.o_sleepscore>=88) reasons.push({dir:slScore>0?"up":"down", txt:"Oura sleep "+row.o_sleepscore});
      }

      // weighted composite
      var wsum=weights.reduce(function(a,b){return a+b;},0)||1;
      var comp=0; for(var k=0;k<parts.length;k++) comp+=parts[k]*weights[k]; comp/=wsum;

      // ---- temperature warning (illness/stress early flag) ----
      var tempFlag=false;
      if(row.o_tempdev!=null && row.o_tempdev>=0.5){
        tempFlag=true; comp=Math.min(comp,comp-0.25);
        reasons.push({dir:"warn", txt:"Body temp +"+row.o_tempdev.toFixed(1)+"°C above normal — possible illness/stress"});
      }

      // ---- subjective override: a rough morning pulls toward caution on its own ----
      if(row.hp_subjective!=null){
        if(row.hp_subjective<=5){
          comp=Math.min(comp,-0.35);
          reasons.push({dir:"warn", txt:"Subjective "+row.hp_subjective+"/10 is low — capped toward recover regardless of other signals"});
        } else if(row.hp_subjective<=6.5){
          comp=Math.min(comp,-0.05);
          reasons.push({dir:"warn", txt:"Subjective "+row.hp_subjective+"/10 is down — held to moderate at best today"});
        }
      }

      // ---- tag override (pain/illness in 360HP notes) ----
      var text=((row.tags||"")+" "+(row.note||"")).toLowerCase();
      if(["pain","fatigue","ill","sick","injur","lock"].some(function(w){return text.indexOf(w)>=0;})){
        comp=Math.min(comp,-0.5);
        reasons.push({dir:"warn", txt:"Flagged in notes: "+(row.tags||row.note)});
      }

      // ---- agreement / disagreement between 360HP HRV and Oura readiness ----
      var confidence="single source";
      if(hDev!==null && row.o_readiness!=null){
        var hpPos=hDev>0.03, hpNeg=hDev<-0.03;
        var ouPos=row.o_readiness>=78, ouNeg=row.o_readiness<70;
        if((hpPos&&ouPos)||(hpNeg&&ouNeg)) confidence="high — sources agree";
        else if((hpPos&&ouNeg)||(hpNeg&&ouPos)){
          confidence="mixed — sources disagree";
          comp=comp>0?comp*0.5:comp*0.7; // pull toward neutral/caution on conflict
          reasons.push({dir:"warn", txt:"360HP HRV and Oura disagree today — easing the call toward caution"});
        } else confidence="moderate";
      }

      var band=comp>=0.15?"green":(comp>=-0.2?"yellow":"red");
      var hasAnchor=(hBase!==null && hrv!=null);

      // 0-100 readiness score: comp is -1..+1. Map so 50 = baseline/neutral,
      // with a gentle curve so mid-range days aren't all bunched together.
      var score100=Math.round(50 + 50*Math.max(-1,Math.min(1, comp*1.15)));

      return Object.assign({},row,{hrv:hrv,hrvSrc:hrvSrc,hBase:hBase,hSd:hSd,hDev:hDev,
        rhr:rhr,rBase:rBase,roll7:roll7,roll30:roll30,comp:comp,score100:score100,band:band,
        reasons:reasons,confidence:confidence,tempFlag:tempFlag,has:hasAnchor});
    });
  }

  var VERD={ green:{w:"GREEN",h:"Push",b:"Body's ready. Good day for a hard session or heavy practice load."},
    yellow:{w:"YELLOW",h:"Moderate",b:"Middle ground. Technical work, skills, or a moderate session — leave max effort for a green day."},
    red:{w:"RED",h:"Recover",b:"Signals are down. Rest, mobility, or light recovery. Pushing today digs the hole deeper."} };

  // ---------- Oura fetch ----------
  function fetchOura(cb){
    if(!WORKER_URL || WORKER_URL.indexOf("http")!==0){ cb({error:"No relay URL set"}); return; }
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},12000);
    fetch(WORKER_URL,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(d){
      clearTimeout(to);
      if(d.error){ cb({error:d.error}); return; }
      setJSON(K_OURA,{readiness:d.readiness||[],daily_sleep:d.daily_sleep||[],sleep_detail:d.sleep_detail||{}});
      set(K_OURATIME,String(Date.now()));
      cb({ok:true});
    }).catch(function(e){ clearTimeout(to); cb({error:e.name==="AbortError"?"Timed out reaching Oura":e.message}); });
  }

  // ---------- gym (Google Sheets via Apps Script) ----------
  function fetchGym(cb){
    if(!GYM_URL || GYM_URL.indexOf("http")!==0){ cb({error:"No gym URL set"}); return; }
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},15000);

  // POST logged sets. rows: [{week,day,date,exercise,v1,v2,v3,v4,done}]
  function postGym(rows,cb){
    if(!GYM_URL){ cb({error:"No gym URL set"}); return; }
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},15000);
    // Apps Script web apps accept simple POST; text/plain avoids a CORS preflight
    fetch(GYM_URL,{method:"POST",body:JSON.stringify({rows:rows}),headers:{"Content-Type":"text/plain;charset=utf-8"},signal:ctrl.signal})
      .then(function(r){return r.json();}).then(function(d){
        clearTimeout(to);
        if(!d.ok){ cb({error:d.error||"Save failed"}); return; }
        cb({ok:true,saved:d.saved});
      }).catch(function(e){ clearTimeout(to); cb({error:e.name==="AbortError"?"Timed out saving":e.message}); });
  }

  var CHARTS=[];

  function baseOpts(extra){var o={responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
    plugins:{legend:{display:false},tooltip:{backgroundColor:C.panel2,borderColor:C.line,borderWidth:1,titleColor:C.muted,bodyColor:C.ink}},
    scales:{x:{grid:{color:C.line,drawTicks:false},ticks:{color:C.muted,maxRotation:0,autoSkip:true,maxTicksLimit:6},border:{color:C.line}},
            y:{grid:{color:C.line,drawTicks:false},ticks:{color:C.muted},border:{display:false}}}};
    if(extra) deepMerge(o,extra); return o;}
  function deepMerge(t,s){for(var k in s){if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){t[k]=t[k]||{};deepMerge(t[k],s[k]);}else t[k]=s[k];}return t;}

  function buildCompare(container,model){

    var lbl=both.map(function(d){return fmt(new Date(d.iso));});
    lineChart(container,"360HP vs Oura HRV","Both raw HRV (ms) on the same days. Close lines = your sources agree; gaps = they diverge.",lbl,[
      {label:"360HP",data:both.map(function(d){return r1(d.hp_hrv);}),borderColor:C.hrv,borderWidth:2.4,pointRadius:2,tension:0.3},
      {label:"Oura",data:both.map(function(d){return r1(d.o_hrv);}),borderColor:C.oura,borderWidth:2.4,pointRadius:2,tension:0.3}
    ],LEG);

    // difference bars
    (function(){var cd=card("Daily difference (360HP \u2212 Oura)","How far apart your two HRV sources are each day. Bars near zero = strong agreement.");
      var cv=mkCanvas(cd,200);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"bar",data:{labels:lbl,datasets:[
        {label:"diff (ms)",data:both.map(function(d){return r1(d.hp_hrv-d.o_hrv);}),backgroundColor:both.map(function(d){var x=Math.abs(d.hp_hrv-d.o_hrv);return x<8?C.green:x<18?C.amber:C.red;}),borderRadius:3}

  function buildInsights(container,model){
    destroyCharts();
    if(!chartsReady()){noChart(container);return;}
    var rowsB=model.filter(function(d){return d.has;});
    if(rowsB.length<4){needSync(container,"Insights need a bit more history. Import your full 360HP CSV and sync Oura, then check back.");return;}

    // sleep(360HP) vs HRV scatter + correlation
    var pts=model.filter(function(d){return d.hp_sleep!=null&&d.hrv!=null;}).map(function(d){return {x:d.hp_sleep,y:r1(d.hrv)};});
    if(pts.length>=4){
      var r=pearson(pts.map(function(p){return p.x;}),pts.map(function(p){return p.y;}));
      var cd=card("Does 360HP sleep predict your HRV?", r!=null?("Sleep score (x) vs HRV (y). r = "+r.toFixed(2)+"."):"Sleep vs HRV.");
      var cv=mkCanvas(cd,240);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"scatter",data:{datasets:[{label:"day",data:pts,backgroundColor:C.glow,pointRadius:4}]},
        options:baseOpts({scales:{x:{min:0.5,max:4.5,ticks:{stepSize:1},title:{display:true,text:"sleep score",color:C.muted}},y:{title:{display:true,text:"HRV",color:C.muted}}}})}));
    }

    // Oura sleep vs next-day HRV correlation insight
    var pairs=[];
    for(var i=1;i<model.length;i++){ var prev=model[i-1],cur=model[i];
      if(prev.o_sleepscore!=null&&cur.hrv!=null) pairs.push({x:prev.o_sleepscore,y:cur.hrv}); }
    if(pairs.length>=4){
      var r2=pearson(pairs.map(function(p){return p.x;}),pairs.map(function(p){return p.y;}));
      var cd2=card("Last night's Oura sleep vs today's HRV", r2!=null?("Does a good night lift next-day HRV? r = "+r2.toFixed(2)+"."):"");
      var cv2=mkCanvas(cd2,240);container.appendChild(cd2);
      CHARTS.push(new Chart(cv2,{type:"scatter",data:{datasets:[{label:"day",data:pairs,backgroundColor:C.oura,pointRadius:4}]},
        options:baseOpts({scales:{x:{title:{display:true,text:"prev-night sleep",color:C.muted}},y:{title:{display:true,text:"HRV",color:C.muted}}}})}));
    }

    // what predicts good vs bad days: compare avg metrics on green vs red days
    var greens=model.filter(function(d){return d.band==="green";});
    var reds=model.filter(function(d){return d.band==="red";});
    function avg(list,key){var v=list.map(function(d){return d[key];}).filter(function(x){return x!=null&&isFinite(x);});return v.length?mean(v):null;}
    if(greens.length>=2&&reds.length>=2){
      var ins=document.createElement("div");ins.className="insight";
      var gSleep=avg(greens,"hp_sleep"),rSleep=avg(reds,"hp_sleep");
      var gRhr=avg(greens,"rhr"),rRhr=avg(reds,"rhr");
      var gSubj=avg(greens,"hp_subjective"),rSubj=avg(reds,"hp_subjective");
      var lines=["<b>What your good vs bad days look like</b> ("+greens.length+" green, "+reds.length+" red so far):"];
      if(gSubj!=null&&rSubj!=null) lines.push("\u2022 Subjective: "+gSubj.toFixed(1)+" on green days vs "+rSubj.toFixed(1)+" on red");
      if(gRhr!=null&&rRhr!=null) lines.push("\u2022 Resting HR: "+Math.round(gRhr)+" on green vs "+Math.round(rRhr)+" on red");
      if(gSleep!=null&&rSleep!=null) lines.push("\u2022 Sleep score: "+gSleep.toFixed(1)+" on green vs "+rSleep.toFixed(1)+" on red");
      ins.innerHTML=lines.join("<br>");
      container.appendChild(ins);
    }

    // weekly summary: last 7 days band counts + trend
    var last7=rowsB.slice(-7);
    if(last7.length>=3){
      var g=last7.filter(function(d){return d.band==="green";}).length;
      var y=last7.filter(function(d){return d.band==="yellow";}).length;
      var rd=last7.filter(function(d){return d.band==="red";}).length;
      var wc=card("This week","Your last "+last7.length+" days at a glance.");
      var row=document.createElement("div");row.className="weekrow";
      row.innerHTML="<span>Signal mix</span><span>"+
        '<span class="chip" style="background:'+C.green+'"></span>'.repeat(g)+
        '<span class="chip" style="background:'+C.amber+'"></span>'.repeat(y)+
        '<span class="chip" style="background:'+C.red+'"></span>'.repeat(rd)+
        "</span>";
      wc.appendChild(row);
      var r7now=last7[last7.length-1].roll7, r30now=last7[last7.length-1].roll30;
      if(r7now!=null&&r30now!=null){var tr=document.createElement("div");tr.className="weekrow";
        tr.innerHTML="<span>Fatigue trend</span><span style='color:"+(r7now>=r30now?C.green:C.amber)+"'>"+(r7now>=r30now?"absorbing load well":"load building \u2014 watch it")+"</span>";
        wc.appendChild(tr);}
      container.appendChild(wc);
    }

    // ---- Training load vs recovery (from locally-logged sessions) ----
    var loghist=getJSON(K_LOGHIST,[]);
    if(loghist.length>=2 && chartsReady()){
      // aggregate weekly training volume by ISO date -> sum of top weights that day
      var byDate={};
      loghist.forEach(function(l){ if(!l.date) return; byDate[l.date]=(byDate[l.date]||0)+(l.topWeight||0); });
      var dates=Object.keys(byDate).sort();
      if(dates.length>=2){
        // align HRV roll7 to those dates from model
        var hrvByDate={}; model.forEach(function(d){ if(d.roll7!=null) hrvByDate[d.iso]=r1(d.roll7); });
        var cd=card("Training load vs recovery","Bars = training load that day (sum of top set weights). Line = your 7-day HRV trend. When load climbs while the line falls, you're outrunning recovery.");
        var cv=mkCanvas(cd,230);container.appendChild(cd);
        var lbl=dates.map(function(x){return fmt(new Date(x));});
        CHARTS.push(new Chart(cv,{type:"bar",data:{labels:lbl,datasets:[
          {type:"bar",label:"load (kg)",data:dates.map(function(x){return Math.round(byDate[x]);}),backgroundColor:C.amber+"88",borderRadius:3,yAxisID:"y"},
          {type:"line",label:"HRV 7-day",data:dates.map(function(x){return hrvByDate[x]!=null?hrvByDate[x]:null;}),borderColor:C.hrv,borderWidth:2.4,pointRadius:0,tension:0.3,spanGaps:true,yAxisID:"y1"}
        ]},options:baseOpts(deepMerge({scales:{y:{position:"left",title:{display:true,text:"load",color:C.muted}},y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"HRV",color:C.muted}}}},LEG))}));
      }
    } else if(chartsReady()){
      needSync(container,"Training load vs recovery will chart here once you've logged a few gym sessions in the Training tab. It overlays your training volume against your HRV trend to spot when load is outrunning recovery.");
    }

    // ---- VBT: bar velocity trend at load ----
    var velLogs=loghist.filter(function(l){return l.avgVel!=null&&l.topWeight!=null;});
    if(velLogs.length>=2 && chartsReady()){
      // group by exercise, show the most-logged one
      var byEx={}; velLogs.forEach(function(l){ (byEx[l.exercise]=byEx[l.exercise]||[]).push(l); });
      var topEx=Object.keys(byEx).sort(function(a,b){return byEx[b].length-byEx[a].length;})[0];
      var series=byEx[topEx].slice().sort(function(a,b){return (a.date<b.date?-1:1);});
      if(series.length>=2){
        var cd2=card("Bar speed trend \u2014 "+topEx,"Average bar velocity (m/s) over time for your most-logged lift. A drop in speed at similar loads is an early fatigue signal, often before HRV moves.");
        var cv2=mkCanvas(cd2,220);container.appendChild(cd2);
        var lbl2=series.map(function(l){return fmt(new Date(l.date));});
        CHARTS.push(new Chart(cv2,{type:"line",data:{labels:lbl2,datasets:[
          {label:"avg velocity",data:series.map(function(l){return r1(l.avgVel);}),borderColor:C.glow,borderWidth:2.6,pointRadius:3,tension:0.3},
          {label:"top weight",data:series.map(function(l){return l.topWeight;}),borderColor:C.muted,borderWidth:1,borderDash:[4,3],pointRadius:0,tension:0.3,yAxisID:"y1"}
        ]},options:baseOpts(deepMerge({scales:{y:{position:"left",title:{display:true,text:"m/s",color:C.muted}},y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"kg",color:C.muted}}}},LEG))}));
      }
    } else if(chartsReady()){
      needSync(container,"Bar-speed trends appear here once you've logged velocity for a lift a few times. Tracking bar speed at a given load is elite-level fatigue monitoring \u2014 a speed drop flags fatigue early.");
    }
  }
  var histOpen=null; // iso of expanded day
  function buildHistory(container,model){
    var rowsB=model.filter(function(d){return d.has;});
    if(rowsB.length<1){needSync(container,"No history yet. Import your 360HP CSV (and sync Oura) and your daily scores will build up here.");return;}

    var intro=document.createElement("div");intro.className="cnote";intro.style.margin="0 0 12px";
    intro.textContent="Every day you have data for, newest first. Tap a day to see the full breakdown of why it scored what it did.";
    container.appendChild(intro);

    // newest first
    var list=rowsB.slice().reverse();
    list.forEach(function(d){
      var bc=C[d.band];
      var row=document.createElement("div");row.className="histrow";row.style.borderColor=bc+"44";
      var dateStr=new Date(d.iso).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
      var meta=[];
      if(d.hrv!=null) meta.push("HRV "+d.hrv.toFixed(0)+(d.hrvSrc?" ("+d.hrvSrc+")":""));
      if(d.hp_subjective!=null) meta.push("subj "+d.hp_subjective);
      if(d.o_readiness!=null) meta.push("Oura "+d.o_readiness);
      row.innerHTML='<div class="histscore" style="color:'+bc+'">'+d.score100+'</div>'+
        '<div class="histmid"><div class="histdate">'+dateStr+'</div>'+
        '<div class="histword" style="color:'+bc+'">'+VERD[d.band].w+' \u00b7 '+VERD[d.band].h+'</div>'+
        '<div class="histmeta">'+meta.join("  \u00b7  ")+'</div></div>'+
        '<div style="color:'+C.muted+';font-size:20px">'+(histOpen===d.iso?"\u2013":"+")+'</div>';
      row.onclick=function(){ histOpen=(histOpen===d.iso?null:d.iso); render(false); };
      container.appendChild(row);

      if(histOpen===d.iso){
        var exp=document.createElement("div");exp.className="histexp";
        if(d.reasons&&d.reasons.length){
          d.reasons.forEach(function(r){
            var cls=r.dir==="up"?"rup":r.dir==="down"?"rdown":r.dir==="warn"?"rwarn":"rflat";
            var ico=r.dir==="up"?"\u25b2":r.dir==="down"?"\u25bc":r.dir==="warn"?"\u26a0":"\u2022";
            var line=document.createElement("div");line.className="rline";
            line.innerHTML='<span class="rico '+cls+'">'+ico+'</span><span>'+r.txt+'</span>';
            exp.appendChild(line);
          });
        } else { var e=document.createElement("div");e.className="rline";e.textContent="No detailed breakdown for this day.";exp.appendChild(e); }
        // extra numbers row
        var extra=document.createElement("div");extra.className="histmeta";extra.style.marginTop="8px";
        var bits=[];
        if(d.rhr!=null) bits.push("Resting HR "+d.rhr);
        if(d.o_sleepscore!=null) bits.push("Oura sleep "+d.o_sleepscore);
        if(d.o_tempdev!=null) bits.push("Temp \u0394 "+(d.o_tempdev>0?"+":"")+d.o_tempdev.toFixed(2)+"\u00b0C");
        if(d.confidence) bits.push("confidence: "+d.confidence);
        extra.textContent=bits.join("  \u00b7  ");
        exp.appendChild(extra);
        container.appendChild(exp);
      }
    });

    // quick stats footer
    var scores=rowsB.map(function(d){return d.score100;});
    var g=rowsB.filter(function(d){return d.band==="green";}).length;
    var y=rowsB.filter(function(d){return d.band==="yellow";}).length;
    var rr=rowsB.filter(function(d){return d.band==="red";}).length;
    var sum=document.createElement("div");sum.className="insight";sum.style.marginTop="6px";
    sum.innerHTML="<b>"+rowsB.length+" days tracked.</b> Average score "+Math.round(mean(scores))+"/100 \u00b7 "+
      "<span style='color:"+C.green+"'>"+g+" green</span>, <span style='color:"+C.amber+"'>"+y+" amber</span>, <span style='color:"+C.red+"'>"+rr+" red</span>.";
    container.appendChild(sum);
  }

  // ---------- Training tab (gym sheet) ----------
  var gymStatus={state:"idle",msg:""};
  function buildTraining(container,model){
    var gym=getJSON(K_GYM,null);
    var today=model.length?model[model.length-1]:null;

    // status + sync
    var bar=document.createElement("div");bar.className="sync";
    var gt=get(K_GYMTIME);var gwhen=gt?new Date(parseInt(gt,10)):null;
    var gdot=gymStatus.state==="err"?"doterr":(gym?"dotlive":"dotoff");
    var gmsg=gymStatus.state==="loading"?"Loading your programme\u2026":gymStatus.state==="err"?("Sheet issue: "+gymStatus.msg):gym?("Programme loaded"+(gwhen?" \u00b7 "+gwhen.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"")):"Not loaded yet";
    bar.innerHTML='<span class="'+gdot+'"></span><span>'+gmsg+'</span>';
    var rb=document.createElement("button");rb.className="btn btn-ghost";rb.style.marginLeft="auto";rb.style.padding="6px 12px";rb.textContent="Sync programme";
    rb.onclick=function(){gymStatus={state:"loading",msg:""};render(false);fetchGym(function(res){gymStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"};render(false);});};
    bar.appendChild(rb);container.appendChild(bar);

    if(!gym){
      needSync(container,"Tap \u201cSync programme\u201d to pull your training plan from your Google Sheet. It loads your weeks and days so you can browse and log sessions here.");
      // combined readiness line even without gym
      if(today&&today.has){var ins=document.createElement("div");ins.className="insight";
        ins.innerHTML="<b>Today's readiness: "+today.score100+"/100 ("+VERD[today.band].h+").</b> Sync your programme to see it beside today's session.";
        container.appendChild(ins);}
      return;
    }

    var weeks=gym.weeks||[];
    if(!weeks.length){needSync(container,"Your sheet loaded but no programme weeks were found. Check the sheet has the usual Date/Day layout.");return;}

    // combined readiness banner
    if(today&&today.has){
      var bc=C[today.band];
      var rd=document.createElement("div");rd.className="insight";rd.style.borderColor=bc+"55";
      rd.innerHTML="<b style='color:"+bc+"'>Readiness "+today.score100+"/100 \u2014 "+VERD[today.band].h+".</b> "+VERD[today.band].b+" You decide how to apply it to today's session below.";
      container.appendChild(rd);
    }

    // week/day selectors (persist selection)
    var sel=getJSON(K_GYMSEL,{w:0,d:0});
    if(sel.w>=weeks.length) sel.w=0;
    var wk=weeks[sel.w]; var days=wk.days||[];
    if(sel.d>=days.length) sel.d=0;

    var selCard=document.createElement("div");selCard.className="card";
    selCard.innerHTML='<div class="ctitle">Browse programme</div>';
    // week dropdown
    var wsel=document.createElement("select");wsel.style.cssText="width:100%;padding:11px 12px;border-radius:8px;border:1px solid "+C.line+";background:"+C.panel2+";color:"+C.ink+";font-size:15px;margin:8px 0;";
    weeks.forEach(function(w,i){var o=document.createElement("option");o.value=i;o.textContent=w.name;if(i===sel.w)o.selected=true;wsel.appendChild(o);});
    wsel.onchange=function(){sel.w=parseInt(wsel.value,10);sel.d=0;setJSON(K_GYMSEL,sel);render(false);};
    selCard.appendChild(wsel);
    // day dropdown
    var dsel=document.createElement("select");dsel.style.cssText=wsel.style.cssText;
    days.forEach(function(dd,i){var o=document.createElement("option");o.value=i;o.textContent=(dd.label||("Day "+(i+1)))+(dd.date?"  ("+dd.date+")":"");if(i===sel.d)o.selected=true;dsel.appendChild(o);});
    dsel.onchange=function(){sel.d=parseInt(dsel.value,10);setJSON(K_GYMSEL,sel);render(false);};
    selCard.appendChild(dsel);
    container.appendChild(selCard);

    // the chosen day's exercises, each loggable
    var day=days[sel.d];
    if(!day){needSync(container,"No day selected.");return;}
    var logInputs=[]; // {exercise, inputs:[4], doneEl}
    (day.exercises||[]).forEach(function(ex){
      var c=document.createElement("div");c.className="card";
      var meta=[];
      if(ex.sets) meta.push(ex.sets+" sets"); if(ex.reps) meta.push(ex.reps+" reps");
      c.innerHTML='<div style="font-weight:700;font-size:15px;color:'+C.ink+'">'+ex.name+'</div>'+
        (meta.length?'<div class="cnote" style="margin:3px 0 6px">'+meta.join(" \u00b7 ")+'</div>':'')+
        (ex.notes?'<div class="cnote" style="margin:0 0 8px">'+ex.notes+'</div>':'')+
        (ex.last?'<div class="ssrc" style="color:'+C.muted+';margin-bottom:8px">Last time: '+ex.last+'</div>':'');
      // 4 sets, each with a weight input and a velocity input beneath it
      var grid=document.createElement("div");grid.style.cssText="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;";
      var inputs=[]; var vels=[];
      var inpCss="padding:9px 6px;border-radius:8px;border:1px solid "+C.line+";background:"+C.panel2+";color:"+C.ink+";font-size:15px;text-align:center;width:100%;";
      for(var s=0;s<4;s++){
        var col=document.createElement("div");col.style.cssText="display:flex;flex-direction:column;gap:5px;";
        var slab=document.createElement("div");slab.style.cssText="font-size:10px;color:"+C.muted+";text-align:center;letter-spacing:0.04em;";slab.textContent="Set "+(s+1);
        var inp=document.createElement("input");inp.type="text";inp.inputMode="decimal";inp.placeholder="kg";
        inp.value=(ex.vals&&ex.vals[s])?ex.vals[s]:"";inp.style.cssText=inpCss;
        var vel=document.createElement("input");vel.type="text";vel.inputMode="decimal";vel.placeholder="m/s";
        vel.style.cssText=inpCss+"border-color:"+C.glow+"44;";
        col.appendChild(slab);col.appendChild(inp);col.appendChild(vel);
        grid.appendChild(col);inputs.push(inp);vels.push(vel);
      }
      c.appendChild(grid);
      var vhint=document.createElement("div");vhint.className="ssrc";vhint.style.cssText="color:"+C.muted+";margin-top:6px;";vhint.textContent="Top row = weight (kg) \u00b7 bottom row = bar velocity (m/s)";
      c.appendChild(vhint);

      // Done checkbox
      var doneWrap=document.createElement("div");doneWrap.style.cssText="display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;";
      var box=document.createElement("div");box.className="chkbox";
      var doneState={on:false};
      var lbl=document.createElement("span");lbl.style.cssText="font-size:14px;font-weight:600;color:"+C.muted+";";lbl.textContent="Mark completed";
      function paint(){ box.className="chkbox"+(doneState.on?" on":""); lbl.textContent=doneState.on?"Completed":"Mark completed"; lbl.style.color=doneState.on?C.green:C.muted; }
      doneWrap.onclick=function(){ doneState.on=!doneState.on; paint(); };
      paint();
      doneWrap.appendChild(box);doneWrap.appendChild(lbl);
      c.appendChild(doneWrap);

      logInputs.push({exercise:ex.name,inputs:inputs,vels:vels,done:doneState});
      container.appendChild(c);
    });

    // save button -> POST to sheet
    var saveWrap=document.createElement("div");saveWrap.className="btnrow";
    var saveBtn=document.createElement("button");saveBtn.className="btn btn-primary";
    saveBtn.textContent=gymStatus.state==="saving"?"Saving\u2026":"Log this session";
    saveBtn.onclick=function(){
      var rows=logInputs.map(function(li){
        return {week:wk.name,day:day.label,date:day.date,exercise:li.exercise,
          v1:li.inputs[0].value,v2:li.inputs[1].value,v3:li.inputs[2].value,v4:li.inputs[3].value,
          vel1:li.vels[0].value,vel2:li.vels[1].value,vel3:li.vels[2].value,vel4:li.vels[3].value,
          done:li.done.on};
      }).filter(function(r){return r.v1||r.v2||r.v3||r.v4||r.vel1||r.vel2||r.vel3||r.vel4||r.done;});
      if(!rows.length){alert("Enter set values or tick an exercise as completed before logging.");return;}
      gymStatus={state:"saving",msg:""};render(false);
      postGym(rows,function(res){
        if(res.ok){
          gymStatus={state:"ok",msg:""};
          // cache logged session locally so load & velocity trends can be charted
          var hist=getJSON(K_LOGHIST,[]);
          var logDate=day.date||new Date().toISOString().slice(0,10);
          rows.forEach(function(r){
            // volume = sum of (weight values entered); a simple load proxy per exercise
            var weights=[r.v1,r.v2,r.v3,r.v4].map(function(x){return parseFloat(x)||0;});
            var vols=weights.filter(function(x){return x>0;});
            var vel=[r.vel1,r.vel2,r.vel3,r.vel4].map(function(x){return parseFloat(x)||0;}).filter(function(x){return x>0;});
            hist.push({date:logDate,week:r.week,day:r.day,exercise:r.exercise,
              weights:weights, avgVel: vel.length?(vel.reduce(function(a,b){return a+b;},0)/vel.length):null,
              topWeight: vols.length?Math.max.apply(null,vols):null, ts:Date.now()});
          });
          // keep it from growing unbounded — last ~400 exercise-logs
          if(hist.length>400) hist=hist.slice(hist.length-400);
          setJSON(K_LOGHIST,hist);
          alert("Logged "+res.saved+" exercise"+(res.saved===1?"":"s")+" to your sheet \u2705");
        }
        else{gymStatus={state:"err",msg:res.error};alert("Couldn't save: "+res.error);}
        render(false);
      });
    };
    saveWrap.appendChild(saveBtn);container.appendChild(saveWrap);
  }

  // ---------- app render ----------
  var app=document.getElementById("app");
  var ouraStatus={state:"idle",msg:""};
  var TAB="today";
  var TABSCROLL=0;
  var TABS=[["today","Today"],["history","History"],["training","Training"],["trends","Trends"],["compare","Compare"],["oura","Oura"],["insights","Insights"]];

  function render(savedFlash){
    var arr=fuse();
    var model=arr.length?analyze(arr):[];
    var today=model.length?model[model.length-1]:null;
    app.innerHTML="";

    var head=document.createElement("div");head.className="head";
    head.innerHTML='<div><div class="title">Readiness</div><div class="sub">Fused HRV signal \u2014 360HP + Oura</div></div>'+
      (today?'<div class="latest">Latest reading<br><b class="mono">'+today.iso+'</b></div>':'');
    app.appendChild(head);

    var fileInput=document.createElement("input");fileInput.type="file";fileInput.accept=".csv";fileInput.style.display="none";
    fileInput.addEventListener("change",function(ev){var f=ev.target.files&&ev.target.files[0];if(!f)return;
      var rd=new FileReader();rd.onload=function(x){try{var p=parseCSV(x.target.result);
        if(!p.length||!("rMSSD" in p[0])){alert("That file doesn't look like a 360HP export \u2014 no rMSSD column found.");return;}
        setJSON(K_ROWS,p);render(true);}catch(e){alert("Couldn't read that file. Make sure it's the raw 360HP CSV export.");}};
      rd.readAsText(f);});
    app.appendChild(fileInput);

    if(savedFlash){var sv=document.createElement("div");sv.className="saved";sv.textContent="Saved to this device.";app.appendChild(sv);
      setTimeout(function(){if(sv.parentNode)sv.parentNode.removeChild(sv);},2200);}

    // sync status bar
    var sync=document.createElement("div");sync.className="sync";
    var tt=get(K_OURATIME); var when=tt?new Date(parseInt(tt,10)):null;
    var dotClass=ouraStatus.state==="ok"||getJSON(K_OURA,null)?"dotlive":(ouraStatus.state==="err"?"doterr":"dotoff");
    var syncMsg;
    if(ouraStatus.state==="loading") syncMsg="Syncing with Oura\u2026";
    else if(ouraStatus.state==="err") syncMsg="Oura sync issue: "+ouraStatus.msg;
    else if(getJSON(K_OURA,null)) syncMsg="Oura connected"+(when?" \u00b7 updated "+when.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"");
    else syncMsg="Oura not synced yet";
    sync.innerHTML='<span class="'+dotClass+'"></span><span>'+syncMsg+'</span>';
    var refresh=document.createElement("button");refresh.className="btn btn-ghost";refresh.style.marginLeft="auto";refresh.style.padding="6px 12px";refresh.textContent="Sync Oura";
    refresh.onclick=function(){ ouraStatus={state:"loading",msg:""}; render(false);
      fetchOura(function(res){ ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"}; render(false); }); };
    sync.appendChild(refresh);
    app.appendChild(sync);

    // no data yet -> onboarding, no tabs
    if(!today || !today.has){
      var p=document.createElement("div");p.className="panel";
      p.innerHTML='<div class="ctitle">Get started</div>'+
        '<p class="cnote" style="font-size:14px">Two sources feed your signal. <span class="tag tag-360">360HP</span> is your HRV anchor \u2014 import its CSV. <span class="tag tag-oura">Oura</span> pulls automatically to add readiness, sleep, resting HR and body temperature.</p>';
      var b=document.createElement("button");b.className="btn btn-primary";b.style.padding="12px 20px";b.style.fontSize="15px";b.textContent="Import 360HP CSV";b.onclick=function(){fileInput.click();};
      p.appendChild(b);
      var b3=document.createElement("button");b3.className="btn btn-ghost";b3.style.marginLeft="10px";b3.style.padding="12px 20px";b3.textContent="Sync Oura now";
      b3.onclick=function(){ouraStatus={state:"loading",msg:""};render(false);fetchOura(function(res){ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"};render(false);});};
      p.appendChild(b3);
      app.appendChild(p);
      var foot0=document.createElement("div");foot0.className="foot";
      foot0.textContent="Signal, not diagnosis. This fuses trends across your own data to suggest how hard to go \u2014 it doesn't replace how you actually feel or medical advice.";
      app.appendChild(foot0);
      return;
    }

    // tab bar
    var tabbar=document.createElement("div");tabbar.className="tabbar";
    var activeBtn=null;
    TABS.forEach(function(t){var b=document.createElement("button");b.className="tabbtn"+(TAB===t[0]?" active":"");b.textContent=t[1];
      if(TAB===t[0]) activeBtn=b;
      b.onclick=function(){ TABSCROLL=tabbar.scrollLeft; TAB=t[0]; render(false); };tabbar.appendChild(b);});
    app.appendChild(tabbar);
    // restore the horizontal scroll from before the re-render, then nudge the active tab into view
    tabbar.scrollLeft=TABSCROLL;
    if(activeBtn&&activeBtn.scrollIntoView){ try{ activeBtn.scrollIntoView({inline:"center",block:"nearest"}); }catch(e){} }

    var body=document.createElement("div");app.appendChild(body);

    if(TAB==="today"){
      var bc=C[today.band], bs=C[today.band+"Soft"];
      var v=document.createElement("div");v.className="verdict";
      v.style.background=bs;v.style.border="1px solid "+bc+"55";v.style.boxShadow="0 0 40px -12px "+bc+"66";
      var confColor = today.confidence.indexOf("high")>=0?C.green:today.confidence.indexOf("mixed")>=0?C.amber:C.muted;
      // trend basis line — makes clear the score is relative to your rolling baseline, not one day
      var trendBits=[];
      if(today.hDev!=null){ var pct=Math.round(today.hDev*100);
        trendBits.push("HRV "+(pct>=0?"+":"")+pct+"% vs your 7-day baseline"); }
      if(today.roll7!=null&&today.roll30!=null){
        var dir=today.roll7>=today.roll30; trendBits.push("<span style='color:"+(dir?C.green:C.amber)+"'>"+(dir?"\u25b2 trend climbing":"\u25bc trend sliding")+"</span>"); }
      var trendLine=trendBits.length?'<div style="font-size:12.5px;color:'+C.muted+';margin-top:10px;font-weight:600">'+trendBits.join("  \u00b7  ")+'</div>':'';
      // tournament mode reshapes the guidance toward freshness
      var tournOn=get(K_TOURN)==="1";
      var travelOn=get(K_TRAVEL)==="1";
      var bodyText=VERD[today.band].b;
      if(tournOn){
        if(today.band==="green") bodyText="Tournament week: you're fresh. Keep it that way \u2014 sharpen, don't grind. Save the tank for the course.";
        else if(today.band==="yellow") bodyText="Tournament week: middling readiness. Light and sharp only \u2014 prioritise being fresh over getting work in.";
        else bodyText="Tournament week and signals are down. Rest and recover hard \u2014 arriving fresh matters more than any session right now.";
      }
      v.innerHTML='<div class="vtop">'+
        '<div class="bigscore" style="color:'+bc+';text-shadow:0 0 30px '+bc+'66">'+today.score100+'<span class="scoreout">/100</span></div>'+
        '<div class="scoreside"><div class="vword" style="color:'+bc+'">'+VERD[today.band].w+'</div><div class="vhead">'+(tournOn?"\ud83c\udfcc\ufe0f "+VERD[today.band].h:VERD[today.band].h)+'</div></div>'+
        '</div>'+
        trendLine+
        (travelOn?'<div style="font-size:12px;color:'+C.amber+';margin-top:8px;font-weight:600">\u2708\ufe0f Travel flagged \u2014 a dip today is likely jet lag, not a red flag; don\'t over-read it.</div>':'')+
        '<p class="vbody">'+bodyText+'</p>'+
        '<span class="conf" style="background:'+confColor+'22;color:'+confColor+'">Confidence: '+today.confidence+'</span>';
      body.appendChild(v);

      // Tournament + travel toggles
      var tog=document.createElement("div");tog.className="btnrow";
      var tb=document.createElement("button");tb.className="btn "+(tournOn?"btn-primary":"btn-ghost");
      tb.textContent=(tournOn?"\ud83c\udfcc\ufe0f Tournament mode: ON":"Tournament mode");
      tb.onclick=function(){ set(K_TOURN,tournOn?"0":"1"); render(false); };
      var vb=document.createElement("button");vb.className="btn "+(travelOn?"btn-primary":"btn-ghost");
      vb.textContent=(travelOn?"\u2708\ufe0f Travel day: ON":"Travel day");
      vb.onclick=function(){ set(K_TRAVEL,travelOn?"0":"1"); render(false); };
      tog.appendChild(tb);tog.appendChild(vb);body.appendChild(tog);

      var rc=document.createElement("div");rc.className="reason";rc.innerHTML='<h3>Why this signal</h3>';
      if(today.reasons.length){ today.reasons.forEach(function(r){
        var cls=r.dir==="up"?"rup":r.dir==="down"?"rdown":r.dir==="warn"?"rwarn":"rflat";
        var ico=r.dir==="up"?"\u25b2":r.dir==="down"?"\u25bc":r.dir==="warn"?"\u26a0":"\u2022";
        var line=document.createElement("div");line.className="rline";
        line.innerHTML='<span class="rico '+cls+'">'+ico+'</span><span>'+r.txt+'</span>';rc.appendChild(line);});
      } else { var e=document.createElement("div");e.className="rline";e.textContent="Not enough context yet to explain \u2014 add more history.";rc.appendChild(e); }
      body.appendChild(rc);

      var st=document.createElement("div");st.className="stats";
      function stat(l,val,sub,src,col){return '<div class="stat"><div class="slabel">'+l+'</div><div class="svalue" style="color:'+(col||C.ink)+'">'+val+'</div>'+(sub?'<div class="ssub">'+sub+'</div>':'')+(src?'<div class="ssrc">'+src+'</div>':'')+'</div>';}
      st.innerHTML=stat("HRV",today.hrv!=null?today.hrv.toFixed(1):"\u2014",today.hBase?("base "+today.hBase.toFixed(0)):"",today.hrvSrc||"",C.hrv)+
        stat("Resting HR",today.rhr!=null?today.rhr:"\u2014",today.rBase?("base "+today.rBase.toFixed(0)):"",today.hrvSrc==="360HP"&&today.hp_rhr!=null?"360HP":(today.o_rhr!=null?"Oura":""))+
        stat("Subjective",today.hp_subjective!=null?today.hp_subjective:"\u2014","/ 10",today.hp_subjective!=null?"360HP":"")+
        stat("Oura readiness",today.o_readiness!=null?today.o_readiness:"\u2014","/ 100",today.o_readiness!=null?"Oura":"")+
        stat("Oura sleep",today.o_sleepscore!=null?today.o_sleepscore:"\u2014","/ 100",today.o_sleepscore!=null?"Oura":"")+
        stat("Readiness","<span style='color:"+bc+"'>"+today.score100+"</span>","/ 100","",bc);
      body.appendChild(st);

      var btns=document.createElement("div");btns.className="btnrow";
      var b1=document.createElement("button");b1.className="btn btn-primary";b1.textContent="Update 360HP CSV";b1.onclick=function(){fileInput.click();};
      var b2=document.createElement("button");b2.className="btn btn-ghost";b2.textContent="Clear all data";b2.onclick=function(){if(confirm("Clear 360HP history and Oura cache from this device?")){localStorage.removeItem(K_ROWS);localStorage.removeItem(K_OURA);localStorage.removeItem(K_OURATIME);render(false);}};
      btns.appendChild(b1);btns.appendChild(b2);body.appendChild(btns);
    }
    else if(TAB==="trends") buildTrends(body,model);
    else if(TAB==="compare") buildCompare(body,model);
    else if(TAB==="history") buildHistory(body,model);
    else if(TAB==="training") buildTraining(body,model);
    else if(TAB==="oura") buildOura(body,model);
    else if(TAB==="insights") buildInsights(body,model);

    var foot=document.createElement("div");foot.className="foot";
    foot.textContent="Signal, not diagnosis. This fuses trends across your own data to suggest how hard to go \u2014 it doesn't replace how you actually feel or medical advice. When your two sources disagree, it tells you and leans cautious.";
    app.appendChild(foot);
    if(TAB!=="today") window.scrollTo(0,0);
  }

  // initial render, then auto-sync Oura once on load if we have a URL
  try{
    render(false);
    if(WORKER_URL && WORKER_URL.indexOf("http")===0){
      ouraStatus={state:"loading",msg:""};
      // reflect loading state without full re-render flash: only if today exists
      fetchOura(function(res){ ouraStatus=res.ok?{state:"ok",msg:""}:{state:"err",msg:res.error||"failed"}; render(false); });
    }
  }catch(err){ fail("Something went wrong starting the app: "+err.message); }
})();
</script>
</body>
</html>
