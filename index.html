<style>
  :root{ color-scheme:dark; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#04141A;
    background-image:radial-gradient(120% 80% at 50% -10%, #0A2A34 0%, #061C24 42%, #04141A 100%);
    background-attachment:fixed;
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    color:#DCEEF0;
  }
  .wrap{max-width:860px;margin:0 auto;padding:clamp(16px,4vw,40px);}
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
  .title{font-family:'Fraunces',serif;font-size:clamp(28px,7vw,40px);font-weight:600;letter-spacing:-0.02em;text-shadow:0 0 24px rgba(61,224,200,0.25);}
  .sub{color:#6E9AA0;font-size:14px;margin-top:2px;}
  .latest{text-align:right;font-size:13px;color:#6E9AA0;}
  .latest b{color:#DCEEF0;font-size:15px;font-weight:500;}

  .verdict{border-radius:18px;padding:clamp(20px,4vw,32px);margin-bottom:16px;}
  .vtop{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .dot{width:64px;height:64px;border-radius:50%;flex-shrink:0;}
  .vword{font-variant-numeric:tabular-nums;font-size:12px;letter-spacing:0.14em;font-weight:600;}
  .vhead{font-family:'Fraunces',serif;font-size:clamp(26px,6vw,34px);font-weight:600;line-height:1.1;}
  .vbody{font-size:15px;line-height:1.6;margin:16px 0 0;max-width:560px;}
  .conf{display:inline-block;margin-top:14px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:0.04em;}
  .bigscore{font-family:'Fraunces',serif;font-size:clamp(58px,16vw,88px);font-weight:600;line-height:0.95;font-variant-numeric:tabular-nums;}
  .scoreout{font-size:18px;font-weight:600;opacity:0.5;}
  .scoreside{display:flex;flex-direction:column;justify-content:center;}

  .reason{background:#0A2028;border:1px solid #123845;border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .reason h3{margin:0 0 10px;font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:#DCEEF0;}
  .rline{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #0E2A34;font-size:13.5px;line-height:1.5;}
  .rline:last-child{border-bottom:none;}
  .rico{flex-shrink:0;width:18px;text-align:center;}
  .rup{color:#2FE6B0;} .rdown{color:#FF6B6B;} .rflat{color:#6E9AA0;} .rwarn{color:#E8B65A;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:12px;margin-bottom:16px;}
  .stat{background:#0A2028;border:1px solid #123845;border-radius:12px;padding:14px 16px;}
  .slabel{font-size:11px;color:#6E9AA0;text-transform:uppercase;letter-spacing:0.05em;}
  .svalue{font-size:24px;font-weight:600;margin-top:4px;font-family:'Fraunces',serif;font-variant-numeric:tabular-nums;}
  .ssub{font-size:11.5px;color:#6E9AA0;margin-top:2px;font-variant-numeric:tabular-nums;}
  .ssrc{font-size:10px;color:#3D6B74;margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;}

  .card{background:#0A2028;border:1px solid #123845;border-radius:14px;padding:18px;margin-bottom:16px;}
  .ctitle{font-family:'Fraunces',serif;font-size:17px;font-weight:600;}
  .cnote{color:#6E9AA0;font-size:12.5px;margin:2px 0 12px;line-height:1.5;}
  .cwrap{position:relative;width:100%;}

  .btn{border:none;border-radius:8px;padding:11px 18px;font-size:14px;font-weight:600;}
  .btn-primary{background:#3DE0C8;color:#04141A;box-shadow:0 0 20px -6px #3DE0C8;}
  .btn-ghost{background:transparent;color:#6E9AA0;border:1px solid #123845;font-weight:400;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px;}

  .sync{display:flex;align-items:center;gap:10px;background:#0A2028;border:1px solid #123845;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#6E9AA0;}
  .sync .dotlive{width:8px;height:8px;border-radius:50%;background:#2FE6B0;box-shadow:0 0 8px #2FE6B0;flex-shrink:0;}
  .sync .dotoff{width:8px;height:8px;border-radius:50%;background:#E8B65A;flex-shrink:0;}
  .sync .doterr{width:8px;height:8px;border-radius:50%;background:#FF6B6B;flex-shrink:0;}

  .panel{background:#0A2028;border:1px solid #123845;border-radius:16px;padding:28px;}
  .foot{margin-top:24px;color:#6E9AA0;font-size:12px;line-height:1.6;border-top:1px solid #123845;padding-top:16px;}
  input[type=password],input[type=text]{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #123845;background:#0E2A34;color:#DCEEF0;font-size:15px;}
  label{font-size:13px;font-weight:600;color:#DCEEF0;display:block;margin-bottom:6px;}
  #boot{padding:40px 24px;color:#6E9AA0;font-size:14px;}

  .tag-360{background:#12384522;color:#57C7FF;border:1px solid #57C7FF44;}

  /* tabs */
  .tabbar{position:sticky;top:0;z-index:30;display:flex;gap:4px;overflow-x:auto;background:rgba(4,20,26,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:10px 0 8px;margin:0 0 16px;border-bottom:1px solid #123845;scrollbar-width:none;}

  .mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;margin-bottom:14px;}
  .minicard{background:#0A2028;border:1px solid #123845;border-radius:10px;padding:10px 12px;}
  .minicard .l{font-size:10px;color:#6E9AA0;text-transform:uppercase;letter-spacing:0.05em;}
  .minicard .v{font-size:19px;font-weight:600;font-family:'Fraunces',serif;margin-top:3px;font-variant-numeric:tabular-nums;}
  .needsync{background:#0A2028;border:1px dashed #2FE6B044;border-radius:12px;padding:16px;color:#6E9AA0;font-size:12.5px;line-height:1.5;margin-bottom:16px;}
  .weekrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #0E2A34;font-size:13.5px;}
  .weekrow:last-child{border-bottom:none;}
  .chip{display:inline-block;width:12px;height:12px;border-radius:3px;margin-left:3px;}
  .insight{background:#0A2028;border:1px solid #123845;border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:13.5px;line-height:1.55;}
  .insight b{color:#DCEEF0;}
  .histrow{display:flex;align-items:center;gap:14px;background:#0A2028;border:1px solid #123845;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
  .histrow:active{background:#0E2A34;}
  .histscore{font-family:'Fraunces',serif;font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;min-width:44px;text-align:center;}
  .histmid{flex:1;min-width:0;}
  .histdate{font-size:14px;font-weight:700;color:#DCEEF0;}
  .histword{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
  .histmeta{font-size:11.5px;color:#6E9AA0;margin-top:2px;font-variant-numeric:tabular-nums;}
  .histexp{background:#0A2028;border:1px solid #123845;border-top:none;border-radius:0 0 12px 12px;margin:-8px 0 8px;padding:12px 14px;}

  .chkbox{width:24px;height:24px;border-radius:7px;border:2px solid #3DE0C8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .chkbox.on{background:#2FE6B0;border-color:#2FE6B0;}
  .chkbox.on::after{content:"\2713";color:#04141A;font-weight:800;font-size:15px;}
</style>
</head>
<body>
<div class="wrap" id="app"><div id="boot">Loading…</div></div>

<script>
(function(){
  "use strict";
  var boot=document.getElementById("boot");
  function fail(m){ if(boot) boot.textContent=m; }

  var C={ bg:"#04141A",panel:"#0A2028",panel2:"#0E2A34",line:"#123845",ink:"#DCEEF0",muted:"#6E9AA0",
    glow:"#3DE0C8",green:"#2FE6B0",greenSoft:"#0E3A38",amber:"#E8B65A",amberSoft:"#3A3018",
    yellow:"#E8B65A",yellowSoft:"#3A3018",
    red:"#FF6B6B",redSoft:"#3A1C22",hrv:"#57C7FF",hrvBand:"rgba(87,199,255,0.14)",r7:"#2FE6B0",r30:"#8A7DFF",oura:"#2FE6B0",temp:"#E8B65A" };

  // ==== YOUR RELAY ADDRESS ====
  var WORKER_URL="https://shiny-wind-c11d.mattfitzpatrick1994.workers.dev/";
  var GYM_URL="https://script.google.com/macros/s/AKfycbyIgdhH7JNT5N915Lj1UTbetvNieTz6JdcXV8vDygxwCY4hr5txxN7YDrxynEnzl-xp/exec";

  var K_ROWS="readiness_360hp_rows_v1", K_OURA="readiness_oura_cache_v1", K_OURATIME="readiness_oura_time_v1";
  var K_GYM="readiness_gym_cache_v1", K_GYMTIME="readiness_gym_time_v1", K_GYMSEL="readiness_gym_sel_v1";
  var K_TOURN="readiness_tournament_v1", K_LOGHIST="readiness_loghist_v1", K_TRAVEL="readiness_travel_v1";
  var K_FLAGHIST="readiness_flaghist_v1"; // per-date record of tournament/travel flags
  var K_NOTES="readiness_notes_v1";       // per-date free-text notes
  // per-day flags: {tourn:bool, travel:""|"short"|"long"}
  function getFlags(iso){ var fh=getJSON(K_FLAGHIST,{}); return fh[iso]||{}; }
  function setFlag(iso,kind,val){
    try{
      var fh=getJSON(K_FLAGHIST,{});
      fh[iso]=fh[iso]||{};
      if(val===false||val===""||val==null) delete fh[iso][kind]; else fh[iso][kind]=val;
      if(!fh[iso].tourn && !fh[iso].travel) delete fh[iso];
      setJSON(K_FLAGHIST,fh);
    }catch(e){}
  }
  function getNote(iso){ var n=getJSON(K_NOTES,{}); return n[iso]||""; }
  function setNote(iso,txt){
    try{
      var n=getJSON(K_NOTES,{});
      if(txt&&txt.trim()) n[iso]=txt.trim(); else delete n[iso];
      setJSON(K_NOTES,n);
    }catch(e){}
  }

  function get(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  function getJSON(k,f){try{var s=localStorage.getItem(k);return s?JSON.parse(s):f;}catch(e){return f;}}
  function setJSON(k,v){set(k,JSON.stringify(v));}

  // ---------- helpers ----------
  function parseCSV(t){var L=t.trim().split(/\r?\n/);var H=L[0].split(",").map(function(h){return h.trim();});
    return L.slice(1).map(function(l){var p=l.split(",");var o={};H.forEach(function(h,i){o[h]=(p[i]!=null?p[i]:"").trim();});return o;});}
  function pDate(s){var p=s.split("-").map(Number);return new Date(p[2],p[1]-1,p[0]);}       // DD-MM-YYYY (360HP)
  function isoDate(d){return d.toISOString().slice(0,10);}                                    // YYYY-MM-DD
  function fmt(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
  function median(a){if(!a.length)return null;var s=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
  function mean(a){if(!a.length)return null;return a.reduce(function(x,y){return x+y;},0)/a.length;}
  function stdev(a){if(a.length<2)return null;var m=mean(a);return Math.sqrt(mean(a.map(function(v){return (v-m)*(v-m);})));}
  function pearson(xs,ys){var n=xs.length;if(n<4)return null;var mx=mean(xs),my=mean(ys),nu=0,dx=0,dy=0;
    for(var i=0;i<n;i++){var a=xs[i]-mx,b=ys[i]-my;nu+=a*b;dx+=a*a;dy+=b*b;}if(!dx||!dy)return null;return nu/Math.sqrt(dx*dy);}
  function r1(v){return v==null?null:Math.round(v*10)/10;}
  function r2(v){return v==null?null:Math.round(v*100)/100;}
  // least-squares best fit; returns {m,b} for y = m*x + b, or null
  function linreg(xs,ys){var n=xs.length;if(n<2)return null;var mx=mean(xs),my=mean(ys),num=0,den=0;
    for(var i=0;i<n;i++){var dx=xs[i]-mx;num+=dx*(ys[i]-my);den+=dx*dx;}if(!den)return null;
    var m=num/den;return {m:m,b:my-m*mx};}

  // ---------- data fusion ----------
  // Build a per-day map keyed by YYYY-MM-DD merging 360HP rows + Oura cache.
  function fuse(){
    var rows360=getJSON(K_ROWS,null);
    var oura=getJSON(K_OURA,null); // {readiness:[],daily_sleep:[],sleep_detail:{}}
    var days={};

    if(rows360){
      rows360.forEach(function(r){
        if(!r.date||!r.rMSSD) return;
        var iso=isoDate(pDate(r.date));
        days[iso]=days[iso]||{iso:iso};
        days[iso].hp_hrv=parseFloat(r.rMSSD);
        days[iso].hp_rhr=r.RHR?parseFloat(r.RHR):null;
        days[iso].hp_subjective=r.subjective?parseFloat(r.subjective):null;
        days[iso].hp_objective=r.objective?parseFloat(r.objective):null;
        days[iso].hp_sleep=r.sleep?parseFloat(r.sleep):null;
        days[iso].hp_energy=r.energy?parseFloat(r.energy):null;
        days[iso].hp_diet=r.diet?parseFloat(r.diet):null;
        days[iso].hp_exercise=r.exercise?parseFloat(r.exercise):null;
        days[iso].hp_happiness=r.happiness?parseFloat(r.happiness):null;
        days[iso].tags=(r.tags||"").trim(); days[iso].note=(r.note||"").trim();
      });
    }
    if(oura){
      (oura.readiness||[]).forEach(function(r){
        var d=days[r.day]=days[r.day]||{iso:r.day};
        d.o_readiness=r.score!=null?r.score:null;
        d.o_tempdev=r.temperature_deviation!=null?r.temperature_deviation:null;
        if(r.contributors){ d.o_hrvbal=r.contributors.hrv_balance; d.o_rhrcontrib=r.contributors.resting_heart_rate; }
      });
      (oura.daily_sleep||[]).forEach(function(r){
        var d=days[r.day]=days[r.day]||{iso:r.day};
        d.o_sleepscore=r.score!=null?r.score:null;
      });
      var det=oura.sleep_detail||{};
      Object.keys(det).forEach(function(day){
        var d=days[day]=days[day]||{iso:day};
        d.o_hrv=det[day].average_hrv;          // raw ms — comparable to 360HP
        d.o_rhr=det[day].lowest_heart_rate!=null?det[day].lowest_heart_rate:det[day].average_heart_rate;
        d.o_sleephrs=det[day].total_sleep_hours;
      });
    }
    // to sorted array
    var arr=Object.keys(days).sort().map(function(k){return days[k];});
    return arr;
  }

  // rolling-baseline signal engine with 360HP as HRV anchor + Oura fusion
  function analyze(arr){
    var W=7;
    return arr.map(function(row,i){
      var prior=arr.slice(Math.max(0,i-W),i);

      // choose HRV anchor: prefer 360HP, fall back to Oura raw HRV
      function hrvOf(d){ return d.hp_hrv!=null?d.hp_hrv:(d.o_hrv!=null?d.o_hrv:null); }
      var hrv=hrvOf(row), hrvSrc=row.hp_hrv!=null?"360HP":(row.o_hrv!=null?"Oura":null);
      var hp=prior.map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var hBase=hp.length>=3?median(hp):null, hSd=hp.length>=3?stdev(hp):null;
      var hDev=(hBase&&hrv!=null)?(hrv-hBase)/hBase:null;

      // resting HR: prefer 360HP, else Oura
      var rhr=row.hp_rhr!=null?row.hp_rhr:(row.o_rhr!=null?row.o_rhr:null);
      var rhrSrc=row.hp_rhr!=null?"360HP":(row.o_rhr!=null?"Oura":null);
      var rp=prior.map(function(d){return d.hp_rhr!=null?d.hp_rhr:d.o_rhr;}).filter(function(v){return v!=null&&isFinite(v);});
      var rBase=rp.length>=3?median(rp):null;

      // rolling avgs of HRV anchor
      var w7=arr.slice(Math.max(0,i-6),i+1).map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var w30=arr.slice(Math.max(0,i-29),i+1).map(hrvOf).filter(function(v){return v!=null&&isFinite(v);});
      var roll7=w7.length>=3?mean(w7):null, roll30=w30.length>=5?mean(w30):null;

      // ---- component sub-scores (-1 bad .. +1 good) ----
      var reasons=[];
      var parts=[], weights=[];

      if(hDev!==null){
        var hScore=Math.max(-1,Math.min(1,hDev/0.15));
        parts.push(hScore); weights.push(0.45);
        var pct=Math.round(hDev*100);
        reasons.push({dir:hScore>0.15?"up":hScore<-0.15?"down":"flat",
          txt:"HRV "+(pct>=0?"+":"")+pct+"% vs baseline"+(hrvSrc?" ("+hrvSrc+")":"")});
      }
      if(row.hp_subjective!=null){
        var sScore=Math.max(-1,Math.min(1,(row.hp_subjective-7.5)/2));
        parts.push(sScore); weights.push(0.28);
        reasons.push({dir:sScore>0.2?"up":sScore<-0.2?"down":"flat", txt:"Subjective "+row.hp_subjective+"/10 (360HP)"});
      }
      if(rBase&&rhr!=null){
        var rd=(rhr-rBase)/rBase; var rScore=Math.max(-1,Math.min(1,-rd/0.08));
        parts.push(rScore); weights.push(0.12);
        var rdiff=Math.round(rhr-rBase);
        if(Math.abs(rdiff)>=2) reasons.push({dir:rScore>0?"up":"down", txt:"Resting HR "+(rdiff>0?"+":"")+rdiff+" bpm"+(rhrSrc?" ("+rhrSrc+")":"")});
      }
      if(row.o_readiness!=null){
        var oScore=Math.max(-1,Math.min(1,(row.o_readiness-75)/15));
        parts.push(oScore); weights.push(0.09);
        reasons.push({dir:oScore>0.2?"up":oScore<-0.2?"down":"flat", txt:"Oura readiness "+row.o_readiness});
      }
      if(row.o_sleepscore!=null){
        var slScore=Math.max(-1,Math.min(1,(row.o_sleepscore-75)/18));
        parts.push(slScore); weights.push(0.06);
        if(row.o_sleepscore<70||row.o_sleepscore>=88) reasons.push({dir:slScore>0?"up":"down", txt:"Oura sleep "+row.o_sleepscore});
      }

      // weighted composite
      var wsum=weights.reduce(function(a,b){return a+b;},0)||1;
      var comp=0; for(var k=0;k<parts.length;k++) comp+=parts[k]*weights[k]; comp/=wsum;

      // ---- temperature warning (illness/stress early flag) ----
      var tempFlag=false;
      if(row.o_tempdev!=null && row.o_tempdev>=0.5){
        tempFlag=true; comp=Math.min(comp,comp-0.25);
        reasons.push({dir:"warn", txt:"Body temp +"+row.o_tempdev.toFixed(1)+"°C above normal — possible illness/stress"});
      }

      // ---- subjective override: a rough morning pulls toward caution on its own ----
      if(row.hp_subjective!=null){
        if(row.hp_subjective<=5){
          comp=Math.min(comp,-0.35);
          reasons.push({dir:"warn", txt:"Subjective "+row.hp_subjective+"/10 is low — capped toward recover regardless of other signals"});
        } else if(row.hp_subjective<=6.5){
          comp=Math.min(comp,-0.05);
          reasons.push({dir:"warn", txt:"Subjective "+row.hp_subjective+"/10 is down — held to moderate at best today"});
        }
      }

      // ---- tag override (pain/illness in 360HP notes) ----
      var text=((row.tags||"")+" "+(row.note||"")).toLowerCase();
      if(["pain","fatigue","ill","sick","injur","lock"].some(function(w){return text.indexOf(w)>=0;})){
        comp=Math.min(comp,-0.5);
        reasons.push({dir:"warn", txt:"Flagged in notes: "+(row.tags||row.note)});
      }

      // ---- agreement / disagreement between 360HP HRV and Oura readiness ----
      var confidence="single source";
      if(hDev!==null && row.o_readiness!=null){
        var hpPos=hDev>0.03, hpNeg=hDev<-0.03;
        var ouPos=row.o_readiness>=78, ouNeg=row.o_readiness<70;
        if((hpPos&&ouPos)||(hpNeg&&ouNeg)) confidence="high — sources agree";
        else if((hpPos&&ouNeg)||(hpNeg&&ouPos)){
          confidence="mixed — sources disagree";
          comp=comp>0?comp*0.5:comp*0.7; // pull toward neutral/caution on conflict
          reasons.push({dir:"warn", txt:"360HP HRV and Oura disagree today — easing the call toward caution"});
        } else confidence="moderate";
      }

      // ---- travel: a flight YESTERDAY is recorded as CONTEXT only ----
      // Deliberately does NOT move the score — HRV, resting HR and subjective already
      // capture a flight's real cost. Penalising on top would double-count it.
      // The flag exists so a dip can be explained, not pre-judged.
      var prevIso=(function(){ var d=new Date(row.iso+"T00:00:00"); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
      var travel=(getFlags(prevIso).travel)||"";
      if(travel){
        reasons.push({dir:"flat", txt:(travel==="long"?"Long-haul":"Short-haul")+" flight yesterday \u2014 context for today's numbers (not scored)"});
      }

      var band=comp>=0.15?"green":(comp>=-0.2?"yellow":"red");
      var hasAnchor=(hBase!==null && hrv!=null);

      // 0-100 readiness score: comp is -1..+1. Map so 50 = baseline/neutral,
      // with a gentle curve so mid-range days aren't all bunched together.
      var score100=Math.round(50 + 50*Math.max(-1,Math.min(1, comp*1.15)));

      return Object.assign({},row,{hrv:hrv,hrvSrc:hrvSrc,hBase:hBase,hSd:hSd,hDev:hDev,
        rhr:rhr,rBase:rBase,roll7:roll7,roll30:roll30,comp:comp,score100:score100,band:band,
        reasons:reasons,confidence:confidence,tempFlag:tempFlag,has:hasAnchor,travel:travel,
        tourn:!!getFlags(row.iso).tourn, appNote:getNote(row.iso)});
    });
  }

  var VERD={ green:{w:"GREEN",h:"Push",b:"Body's ready. Good day for a hard session or heavy practice load."},
    yellow:{w:"YELLOW",h:"Moderate",b:"Middle ground. Technical work, skills, or a moderate session — leave max effort for a green day."},
    red:{w:"RED",h:"Recover",b:"Signals are down. Rest, mobility, or light recovery. Pushing today digs the hole deeper."} };

  // ---------- Oura fetch ----------
  function fetchOura(cb){
    if(!WORKER_URL || WORKER_URL.indexOf("http")!==0){ cb({error:"No relay URL set"}); return; }
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},12000);
    fetch(WORKER_URL,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(d){
      clearTimeout(to);
      if(d.error){ cb({error:d.error}); return; }
      setJSON(K_OURA,{readiness:d.readiness||[],daily_sleep:d.daily_sleep||[],sleep_detail:d.sleep_detail||{}});
      set(K_OURATIME,String(Date.now()));
      cb({ok:true});
    }).catch(function(e){ clearTimeout(to); cb({error:e.name==="AbortError"?"Timed out reaching Oura":e.message}); });
  }

  // ---------- gym (Google Sheets via Apps Script) ----------
  function fetchGym(cb,_attempt){
    if(!GYM_URL || GYM_URL.indexOf("http")!==0){ cb({error:"No gym URL set"}); return; }
    var attempt=_attempt||1;
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},30000);
    fetch(GYM_URL,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(d){
      clearTimeout(to);
      if(!d.ok){ cb({error:d.error||"Sheet returned an error"}); return; }
      setJSON(K_GYM,{weeks:d.weeks||[],history:d.history||[],updated:d.updated||""});
      set(K_GYMTIME,String(Date.now()));
      cb({ok:true});
    }).catch(function(e){ clearTimeout(to);
      // Apps Script cold-start can time out the first hit — retry once automatically
      if(attempt<2){ fetchGym(cb,attempt+1); return; }
      cb({error:e.name==="AbortError"?"Timed out reaching the sheet (tried twice). Tap Sync again — the sheet may just be waking up.":e.message});
    });
  }
  // POST logged sets. rows: [{week,day,date,exercise,v1,v2,v3,v4,done}]
  function postGym(rows,cb){
    if(!GYM_URL){ cb({error:"No gym URL set"}); return; }
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},30000);
    // Apps Script web apps accept simple POST; text/plain avoids a CORS preflight
    fetch(GYM_URL,{method:"POST",body:JSON.stringify({rows:rows}),headers:{"Content-Type":"text/plain;charset=utf-8"},signal:ctrl.signal})
      .then(function(r){return r.json();}).then(function(d){
        clearTimeout(to);
        if(!d.ok){ cb({error:d.error||"Save failed"}); return; }
        cb({ok:true,saved:d.saved});
      }).catch(function(e){ clearTimeout(to); cb({error:e.name==="AbortError"?"Timed out saving \u2014 tap Log again, the sheet may be waking up":e.message}); });
  }

  // ---------- chart helpers ----------
  var CHARTS=[];
  function destroyCharts(){CHARTS.forEach(function(c){try{c.destroy();}catch(e){}});CHARTS=[];}
  function mkCanvas(p,h){var w=document.createElement("div");w.className="cwrap";w.style.height=h+"px";var cv=document.createElement("canvas");w.appendChild(cv);p.appendChild(w);return cv;}
  function card(t,n){var d=document.createElement("div");d.className="card";var x=document.createElement("div");x.className="ctitle";x.textContent=t;d.appendChild(x);if(n){var y=document.createElement("div");y.className="cnote";y.textContent=n;d.appendChild(y);}return d;}
  function baseOpts(extra){var o={responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
    plugins:{legend:{display:false},tooltip:{backgroundColor:C.panel2,borderColor:C.line,borderWidth:1,titleColor:C.muted,bodyColor:C.ink}},
    scales:{x:{grid:{color:C.line,drawTicks:false},ticks:{color:C.muted,maxRotation:0,autoSkip:true,maxTicksLimit:6},border:{color:C.line}},
            y:{grid:{color:C.line,drawTicks:false},ticks:{color:C.muted},border:{display:false}}}};
    if(extra) deepMerge(o,extra); return o;}
  function deepMerge(t,s){for(var k in s){if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){t[k]=t[k]||{};deepMerge(t[k],s[k]);}else t[k]=s[k];}return t;}
  function chartsReady(){return typeof window.Chart!=="undefined";}
  function noChart(container){var c=document.createElement("div");c.className="card";c.style.color=C.muted;c.style.fontSize="13px";
    c.textContent="Charts didn't load this time. Pull down to refresh.";container.appendChild(c);}
  function needSync(container,msg){var d=document.createElement("div");d.className="needsync";d.textContent=msg;container.appendChild(d);}
  function lineChart(container,title,note,labels,datasets,opts,h){var cd=card(title,note);var cv=mkCanvas(cd,h||220);container.appendChild(cd);
    CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:datasets},options:baseOpts(opts||{})}));}
  var LEG={plugins:{legend:{display:true,labels:{color:C.muted,boxWidth:12,usePointStyle:true}}}};

  // ---------- per-tab chart builders ----------
  function buildTrends(container,model){
    destroyCharts();
    if(!chartsReady()){noChart(container);return;}
    Chart.defaults.font.family="Inter, system-ui, sans-serif"; Chart.defaults.color=C.muted;
    var rowsB=model.filter(function(d){return d.has;});
    var labels=rowsB.map(function(d){return fmt(new Date(d.iso));});
    if(rowsB.length<2){needSync(container,"Import your 360HP CSV (and sync Oura) to see trends here.");return;}

    // ---- 360HP-ONLY series (these Trends charts ignore Oura; gaps where no 360HP) ----
    var hpHRV=rowsB.map(function(d){return d.hp_hrv!=null?d.hp_hrv:null;});
    var hpRHR=rowsB.map(function(d){return d.hp_rhr!=null?d.hp_rhr:null;});
    // rolling helpers over a null-tolerant array
    function rollMed(arr,i,w){var v=[];for(var k=Math.max(0,i-w+1);k<=i;k++){if(arr[k]!=null)v.push(arr[k]);}return v.length>=3?median(v):null;}
    function rollMean(arr,i,w){var v=[];for(var k=Math.max(0,i-w+1);k<=i;k++){if(arr[k]!=null)v.push(arr[k]);}return v.length>=3?mean(v):null;}
    function rollSD(arr,i,w){var v=[];for(var k=Math.max(0,i-w+1);k<=i;k++){if(arr[k]!=null)v.push(arr[k]);}return v.length>=3?stdev(v):null;}
    var hpBase=hpHRV.map(function(_,i){return rollMed(hpHRV,i,7);});
    var hpBaseR1=hpBase.map(r1);
    var hp7=hpHRV.map(function(_,i){return rollMean(hpHRV,i,7);});
    var hp30=hpHRV.map(function(_,i){return rollMean(hpHRV,i,30);});
    var hpSD=hpHRV.map(function(_,i){return rollSD(hpHRV,i,7);});

    // HRV (360HP) as bars with the rolling baseline line over them
    (function(){var cd=card("HRV vs your rolling baseline","360HP HRV only. Bars are daily HRV; the line is your 7-day rolling baseline. Gaps = days with no 360HP reading.");
      var cv=mkCanvas(cd,240);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{data:{labels:labels,datasets:[
        {type:"bar",label:"HRV (360HP)",data:hpHRV.map(r1),backgroundColor:C.hrv+"66",borderColor:C.hrv,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"baseline",data:hpBaseR1,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({},LEG))}));})();

    var up=hpHRV.map(function(_,i){return (hpBase[i]!=null&&hpSD[i]!=null)?r1(hpBase[i]+hpSD[i]):null;});
    var lo=hpHRV.map(function(_,i){return (hpBase[i]!=null&&hpSD[i]!=null)?r1(hpBase[i]-hpSD[i]):null;});
    lineChart(container,"HRV trend with variability band","360HP HRV only. Shaded band is your normal swing (\u00b11 SD). Breaking below it = a real dip, not noise.",labels,[
      {label:"upper",data:up,borderColor:"transparent",backgroundColor:C.hrvBand,pointRadius:0,fill:"+1",spanGaps:true},
      {label:"lower",data:lo,borderColor:"transparent",backgroundColor:C.hrvBand,pointRadius:0,fill:false,spanGaps:true},
      {label:"HRV (360HP)",data:hpHRV.map(r1),borderColor:C.hrv,borderWidth:2.4,pointRadius:0,tension:0.3,spanGaps:true}
    ],{},240);

    lineChart(container,"Rolling 7-day vs 30-day HRV","360HP HRV only. When the fast line dips below the slow line, fatigue is building before you feel it.",labels,[
      {label:"7-day",data:hp7.map(r1),borderColor:C.r7,borderWidth:2.4,pointRadius:0,tension:0.35,spanGaps:true},
      {label:"30-day",data:hp30.map(r1),borderColor:C.r30,borderWidth:2.4,pointRadius:0,tension:0.35,spanGaps:true}
    ],LEG);

    // daily score bars
    (function(){var cd=card("Daily readiness score","0\u2013100 from all sources fused. Green \u2265 59, amber 39\u201358, red < 39.");
      var cv=mkCanvas(cd,200);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"bar",data:{labels:labels,datasets:[
        {label:"score",data:rowsB.map(function(d){return d.score100;}),backgroundColor:rowsB.map(function(d){return C[d.band];}),borderRadius:3}
      ]},options:baseOpts({scales:{y:{min:0,max:100}}})}));})();

    // resting HR (360HP only) — bars with dotted rolling avg + ±1SD band, gaps where none
    var hasRhr=hpRHR.filter(function(v){return v!=null;}).length>=2;
    if(hasRhr){
      var rAvg=hpRHR.map(function(_,i){return r1(rollMean(hpRHR,i,7));});
      var rUp=hpRHR.map(function(_,i){var m=rollMean(hpRHR,i,7),sd=rollSD(hpRHR,i,7);return (m!=null&&sd!=null)?r1(m+sd):null;});
      var rLo=hpRHR.map(function(_,i){var m=rollMean(hpRHR,i,7),sd=rollSD(hpRHR,i,7);return (m!=null&&sd!=null)?r1(m-sd):null;});
      var cdR=card("Resting heart rate","360HP resting HR only. Bars are daily; dotted line is your 7-day average; shaded band is \u00b11 SD. A jump above the band can signal fatigue or illness.");
      var cvR=mkCanvas(cdR,230);container.appendChild(cdR);
      CHARTS.push(new Chart(cvR,{data:{labels:labels,datasets:[
        {type:"line",label:"upper",data:rUp,borderColor:"transparent",backgroundColor:"rgba(255,107,107,0.10)",pointRadius:0,fill:"+1",order:3,spanGaps:true},
        {type:"line",label:"lower",data:rLo,borderColor:"transparent",backgroundColor:"rgba(255,107,107,0.10)",pointRadius:0,fill:false,order:3,spanGaps:true},
        {type:"bar",label:"resting HR (360HP)",data:hpRHR,backgroundColor:C.red+"55",borderColor:C.red,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"7-day avg",data:rAvg,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({},LEG))}));
    }
  }

  function buildCompare(container,model){
    destroyCharts();
    if(!chartsReady()){noChart(container);return;}
    var both=model.filter(function(d){return d.hp_hrv!=null&&d.o_hrv!=null;});
    if(both.length<2){
      needSync(container,"This tab compares your 360HP HRV against Oura's raw HRV side by side. It needs the updated Oura relay (v2) deployed so Oura's raw HRV comes through \u2014 once that's live and synced, these charts fill in.");
      return;
    }
    var lbl=both.map(function(d){return fmt(new Date(d.iso));});
    lineChart(container,"360HP vs Oura HRV","Both raw HRV (ms) on the same days. Close lines = your sources agree; gaps = they diverge.",lbl,[
      {label:"360HP",data:both.map(function(d){return r1(d.hp_hrv);}),borderColor:C.hrv,borderWidth:2.4,pointRadius:2,tension:0.3},
      {label:"Oura",data:both.map(function(d){return r1(d.o_hrv);}),borderColor:C.oura,borderWidth:2.4,pointRadius:2,tension:0.3}
    ],LEG);

    // difference bars
    (function(){var cd=card("Daily difference (360HP \u2212 Oura)","How far apart your two HRV sources are each day. Bars near zero = strong agreement.");
      var cv=mkCanvas(cd,200);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"bar",data:{labels:lbl,datasets:[
        {label:"diff (ms)",data:both.map(function(d){return r1(d.hp_hrv-d.o_hrv);}),backgroundColor:both.map(function(d){var x=Math.abs(d.hp_hrv-d.o_hrv);return x<8?C.green:x<18?C.amber:C.red;}),borderRadius:3}
      ]},options:baseOpts()}));})();

    // scatter agreement
    (function(){var cd=card("Agreement scatter","Each dot is a day. The dashed line is the best fit \u2014 the closer dots sit to it, the more your two devices agree.");
      var cv=mkCanvas(cd,240);container.appendChild(cd);
      var pts=both.map(function(d){return {x:r1(d.o_hrv),y:r1(d.hp_hrv)};});
      var datasets=[{type:"scatter",label:"day",data:pts,backgroundColor:C.glow,pointRadius:4}];
      var fit=linreg(both.map(function(d){return d.o_hrv;}),both.map(function(d){return d.hp_hrv;}));
      if(fit){
        var xsv=both.map(function(d){return d.o_hrv;});
        var xmin=Math.min.apply(null,xsv), xmax=Math.max.apply(null,xsv);
        datasets.push({type:"line",label:"best fit",
          data:[{x:r1(xmin),y:r1(fit.m*xmin+fit.b)},{x:r1(xmax),y:r1(fit.m*xmax+fit.b)}],
          borderColor:C.amber,borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false});
      }
      CHARTS.push(new Chart(cv,{data:{datasets:datasets},
        options:baseOpts({scales:{x:{type:"linear",title:{display:true,text:"Oura HRV",color:C.muted}},y:{title:{display:true,text:"360HP HRV",color:C.muted}}}})}));})();

    var r=pearson(both.map(function(d){return d.o_hrv;}),both.map(function(d){return d.hp_hrv;}));
    if(r!=null){var ins=document.createElement("div");ins.className="insight";
      ins.innerHTML="<b>Correlation r = "+r.toFixed(2)+".</b> "+(Math.abs(r)>0.6?"Your two HRV sources track each other closely \u2014 they broadly agree.":Math.abs(r)>0.3?"Moderate agreement \u2014 they move together somewhat but diverge on individual days.":"Weak agreement \u2014 the two devices often tell different stories on a given day, which is exactly why the app leans cautious when they disagree.");
      container.appendChild(ins);}
  }

  function buildOura(container,model){
    destroyCharts();
    if(!chartsReady()){noChart(container);return;}
    var rowsB=model.filter(function(d){return d.has;});
    var labels=rowsB.map(function(d){return fmt(new Date(d.iso));});
    var withO=rowsB.filter(function(d){return d.o_readiness!=null||d.o_sleepscore!=null;});
    if(withO.length<2){
      needSync(container,"No Oura data yet. Tap \u201cSync Oura\u201d at the top \u2014 once it pulls, readiness, sleep, resting HR and body temperature appear here.");
      return;
    }
    lineChart(container,"Oura readiness & body temperature","Readiness score with body-temperature deviation. A temp spike often precedes a bad stretch.",labels,[
      {label:"readiness",data:rowsB.map(function(d){return d.o_readiness;}),borderColor:C.oura,borderWidth:2,pointRadius:0,tension:0.3,yAxisID:"y"},
      {label:"temp \u0394\u00b0C",data:rowsB.map(function(d){return d.o_tempdev;}),borderColor:C.temp,borderWidth:2,pointRadius:0,tension:0.3,yAxisID:"y1"}
    ],deepMerge({scales:{y:{min:40,max:100,position:"left"},y1:{position:"right",grid:{drawOnChartArea:false}}}},LEG),200);

    var hasSleep=rowsB.filter(function(d){return d.o_sleepscore!=null;}).length>=2;
    if(hasSleep) lineChart(container,"Oura sleep score","Your nightly sleep quality score from Oura.",labels,[
      {label:"sleep",data:rowsB.map(function(d){return d.o_sleepscore;}),borderColor:C.r30,borderWidth:2.2,pointRadius:0,tension:0.3}
    ],{scales:{y:{min:0,max:100}}});

    // body temperature — diverging bars from zero, colour-coded, with a rolling-average line
    var hasTemp=rowsB.filter(function(d){return d.o_tempdev!=null;}).length>=2;
    if(hasTemp){
      var tvals=rowsB.map(function(d){return d.o_tempdev!=null?r1(d.o_tempdev):null;});
      var tRoll=tvals.map(function(_,i){var w=[];for(var k=Math.max(0,i-6);k<=i;k++){if(tvals[k]!=null)w.push(tvals[k]);}return w.length?r1(mean(w)):null;});
      var cdT=card("Body temperature deviation","Bars are how far last night's temp sat from normal (0 = normal); amber/red as they climb. Dotted line is your 7-night rolling average.");
      var cvT=mkCanvas(cdT,210);container.appendChild(cdT);
      CHARTS.push(new Chart(cvT,{data:{labels:labels,datasets:[
        {type:"bar",label:"temp \u0394\u00b0C",data:tvals,
          backgroundColor:rowsB.map(function(d){var t=d.o_tempdev;if(t==null)return C.muted;return t>=0.5?C.red:t>=0.25?C.amber:C.green;}),borderRadius:3,order:2},
        {type:"line",label:"7-night avg",data:tRoll,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({scales:{y:{title:{display:true,text:"\u00b0C from normal",color:C.muted},grid:{color:function(ctx){return ctx.tick.value===0?C.muted:C.line;}}}}},LEG))}));
    }

    // Oura resting heart rate — same style as the Trends RHR chart (bars + rolling avg + band)
    var oRhr=rowsB.map(function(d){return d.o_rhr!=null?d.o_rhr:null;});
    if(oRhr.filter(function(v){return v!=null;}).length>=2){
      function orMean(i){var v=[];for(var k=Math.max(0,i-6);k<=i;k++){if(oRhr[k]!=null)v.push(oRhr[k]);}return v.length>=3?mean(v):null;}
      function orSD(i){var v=[];for(var k=Math.max(0,i-6);k<=i;k++){if(oRhr[k]!=null)v.push(oRhr[k]);}return v.length>=3?stdev(v):null;}
      var orAvg=oRhr.map(function(_,i){return r1(orMean(i));});
      var orUp=oRhr.map(function(_,i){var m=orMean(i),sd=orSD(i);return (m!=null&&sd!=null)?r1(m+sd):null;});
      var orLo=oRhr.map(function(_,i){var m=orMean(i),sd=orSD(i);return (m!=null&&sd!=null)?r1(m-sd):null;});
      var cdOR=card("Resting heart rate (Oura)","Oura's overnight resting HR. Bars are daily; dotted line is your 7-day average; shaded band is \u00b11 SD.");
      var cvOR=mkCanvas(cdOR,230);container.appendChild(cdOR);
      CHARTS.push(new Chart(cvOR,{data:{labels:labels,datasets:[
        {type:"line",label:"upper",data:orUp,borderColor:"transparent",backgroundColor:"rgba(255,107,107,0.10)",pointRadius:0,fill:"+1",order:3,spanGaps:true},
        {type:"line",label:"lower",data:orLo,borderColor:"transparent",backgroundColor:"rgba(255,107,107,0.10)",pointRadius:0,fill:false,order:3,spanGaps:true},
        {type:"bar",label:"resting HR (Oura)",data:oRhr,backgroundColor:C.red+"55",borderColor:C.red,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"7-day avg",data:orAvg,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({},LEG))}));
    }

    // sleep hours — bars with a rolling-average dotted line through them
    var hasHrs=rowsB.filter(function(d){return d.o_sleephrs!=null;}).length>=2;
    if(hasHrs){
      var hrs=rowsB.map(function(d){return d.o_sleephrs!=null?d.o_sleephrs:null;});
      // 7-night rolling average (uses available nights up to 7)
      var roll=hrs.map(function(_,i){var w=[];for(var k=Math.max(0,i-6);k<=i;k++){if(hrs[k]!=null)w.push(hrs[k]);}return w.length?r1(mean(w)):null;});
      var cdH=card("Time asleep (hours)","Bars are each night's sleep. The dotted line is your 7-night rolling average \u2014 the trend under the night-to-night noise.");
      var cvH=mkCanvas(cdH,210);container.appendChild(cdH);
      CHARTS.push(new Chart(cvH,{data:{labels:labels,datasets:[
        {type:"bar",label:"hours",data:hrs,backgroundColor:C.hrv+"66",borderColor:C.hrv,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"7-night avg",data:roll,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({scales:{y:{title:{display:true,text:"hours",color:C.muted}}}},LEG))}));
    }
    else { needSync(container,"Sleep-stage and hours detail needs the updated Oura relay (v2). Once it's deployed and synced, this fills in."); }
  }

  function buildHP360(container,model){
    destroyCharts();
    if(!chartsReady()){noChart(container);return;}
    Chart.defaults.font.family="Inter, system-ui, sans-serif"; Chart.defaults.color=C.muted;
    var rowsB=model.filter(function(d){return d.has;});
    var labels=rowsB.map(function(d){return fmt(new Date(d.iso));});
    if(rowsB.length<2){needSync(container,"Import your 360HP CSV to see your measures here.");return;}

    // ---- B3: Raw HRV (rMSSD) + baseline ----
    (function(){
      var hp=rowsB.map(function(d){return d.hp_hrv!=null?d.hp_hrv:null;});
      if(hp.filter(function(v){return v!=null;}).length<2) return;
      var base=hp.map(function(_,i){var v=[];for(var k=Math.max(0,i-6);k<=i;k++){if(hp[k]!=null)v.push(hp[k]);}return v.length>=3?r1(median(v)):null;});
      var cd=card("Raw HRV (rMSSD)","Your core 360HP number \u2014 morning rMSSD in ms. Bars are daily; the dotted line is your 7-day baseline. Gaps = no reading that day.");
      var cv=mkCanvas(cd,230);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{data:{labels:labels,datasets:[
        {type:"bar",label:"rMSSD",data:hp.map(r1),backgroundColor:C.hrv+"66",borderColor:C.hrv,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"baseline",data:base,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({scales:{y:{title:{display:true,text:"rMSSD (ms)",color:C.muted}}}},LEG))}));
    })();

    // ---- Objective score + rolling baseline ----
    (function(){
      var obj=rowsB.map(function(d){return d.hp_objective!=null?d.hp_objective:null;});
      if(obj.filter(function(v){return v!=null;}).length<2) return;
      var base=obj.map(function(_,i){var v=[];for(var k=Math.max(0,i-6);k<=i;k++){if(obj[k]!=null)v.push(obj[k]);}return v.length>=3?r1(median(v)):null;});
      var cd=card("Objective score vs rolling baseline","Your 360HP objective score. Bars are daily; the dotted line is your 7-day baseline. Bars under the line = below your normal.");
      var cv=mkCanvas(cd,230);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{data:{labels:labels,datasets:[
        {type:"bar",label:"objective",data:obj.map(r1),backgroundColor:C.glow+"55",borderColor:C.glow,borderWidth:1,borderRadius:3,order:2},
        {type:"line",label:"baseline",data:base,borderColor:C.amber,borderWidth:2,borderDash:[5,4],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({scales:{y:{title:{display:true,text:"objective score",color:C.muted}}}},LEG))}));
    })();

    // ---- B2: Daily subjective score (0-10) + 7-day avg, colour-coded ----
    (function(){
      var sub=rowsB.map(function(d){return d.hp_subjective!=null?d.hp_subjective:null;});
      if(sub.filter(function(v){return v!=null;}).length<2) return;
      var roll=sub.map(function(_,i){var v=[];for(var k=Math.max(0,i-6);k<=i;k++){if(sub[k]!=null)v.push(sub[k]);}return v.length?r1(mean(v)):null;});
      var cd=card("Subjective wellbeing (0\u201310)","How you rated yourself each day. Bars are colour-coded (red <5, amber <6.5, green above); the dotted line is your 7-day average.");
      var cv=mkCanvas(cd,220);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{data:{labels:labels,datasets:[
        {type:"bar",label:"subjective",data:sub,backgroundColor:sub.map(function(v){return v==null?C.muted:v<5?C.red:v<6.5?C.amber:C.green;}),borderRadius:3,order:2},
        {type:"line",label:"7-day avg",data:roll,borderColor:C.ink,borderWidth:2,borderDash:[5,3],pointRadius:0,tension:0.3,order:1,spanGaps:true}
      ]},options:baseOpts(deepMerge({scales:{y:{min:0,max:10,title:{display:true,text:"score",color:C.muted}}}},LEG))}));
    })();

    // ---- B1: All 5 self-ratings over time (1-4) ----
    (function(){
      var fields=[["hp_sleep","Sleep",C.hrv],["hp_energy","Energy",C.green],["hp_diet","Diet",C.amber],["hp_exercise","Exercise",C.r30],["hp_happiness","Happiness",C.glow]];
      var any=fields.some(function(f){return rowsB.filter(function(d){return d[f[0]]!=null;}).length>=2;});
      if(!any) return;
      var ds=fields.map(function(f){return {label:f[1],data:rowsB.map(function(d){return d[f[0]]!=null?d[f[0]]:null;}),borderColor:f[2],backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.35,spanGaps:true};});
      var cd=card("Wellness self-ratings (1\u20134)","Your five daily 360HP ratings over time \u2014 sleep, energy, diet, exercise, happiness.");
      var cv=mkCanvas(cd,240);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"line",data:{labels:labels,datasets:ds},options:baseOpts(deepMerge({scales:{y:{min:1,max:4,ticks:{stepSize:1}}}},LEG))}));
    })();

    // ---- A1: How you feel vs your objective score (over time, dual axis) ----
    (function(){
      var sub=rowsB.map(function(d){return d.hp_subjective!=null?d.hp_subjective:null;});
      var obj=rowsB.map(function(d){return d.hp_objective!=null?r1(d.hp_objective):null;});
      if(sub.filter(function(v){return v!=null;}).length<3||obj.filter(function(v){return v!=null;}).length<3) return;
      var cd=card("How you feel vs your objective score","Your subjective score (0\u201310, how you felt) and your 360HP objective score over time. When they diverge, your gut read and the numbers disagree.");
      var cv=mkCanvas(cd,230);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{data:{labels:labels,datasets:[
        {type:"line",label:"subjective",data:sub,borderColor:C.amber,borderWidth:2.4,pointRadius:0,tension:0.35,spanGaps:true,yAxisID:"y"},
        {type:"line",label:"objective",data:obj,borderColor:C.glow,borderWidth:2.4,pointRadius:0,tension:0.35,spanGaps:true,yAxisID:"y1"}
      ]},options:baseOpts(deepMerge({scales:{
        y:{position:"left",min:0,max:10,title:{display:true,text:"subjective",color:C.muted}},
        y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"objective",color:C.muted}}
      }},LEG))}));
    })();

    // ---- A2: Wellness balance radar (avg of each self-rating over the range) ----
    (function(){
      var fields=[["hp_sleep","Sleep"],["hp_energy","Energy"],["hp_diet","Diet"],["hp_exercise","Exercise"],["hp_happiness","Happiness"]];
      var avgs=fields.map(function(f){var v=rowsB.map(function(d){return d[f[0]];}).filter(function(x){return x!=null;});return v.length?mean(v):null;});

  function buildInsights(container,model){
    destroyCharts();

    var rowsB=model.filter(function(d){return d.has;});
    if(rowsB.length<4){needSync(container,"Insights need a bit more history. Import your full 360HP CSV and sync Oura, then check back.");return;}

    // (the "Does 360HP sleep predict your HRV?" scatter moved to the new 360HP tab)

    // ---- Option D: rolling sleep vs rolling HRV scatter, dots shaded by time + best fit ----
    (function(){
      var hasHrs=model.filter(function(d){return d.o_sleephrs!=null;}).length;
      if(hasHrs>=4){
        var sleepRoll=[], hrvRoll=[];
        for(var i=0;i<model.length;i++){
          var sW=[], hW=[];
          for(var k=Math.max(0,i-6);k<=i;k++){
            if(model[k].o_sleephrs!=null) sW.push(model[k].o_sleephrs);
            if(model[k].hrv!=null) hW.push(model[k].hrv);
          }
          sleepRoll.push(sW.length?mean(sW):null);
          hrvRoll.push(hW.length?mean(hW):null);
        }
        var pts=[], idx=[];
        for(var j=0;j<model.length;j++){ if(sleepRoll[j]!=null&&hrvRoll[j]!=null){ pts.push({x:r1(sleepRoll[j]),y:r1(hrvRoll[j])}); idx.push(j); } }
        if(pts.length>=4){
          // colour dots dark->bright by recency (older = muted blue, newer = bright glow)
          var cols=idx.map(function(_,i){var t=pts.length>1?i/(pts.length-1):1;
            // interpolate hrv-blue (#3A6B8C-ish) -> glow (#3DE0C8)
            function mix(a,b,t){return Math.round(a+(b-a)*t);}
            var r=mix(0x3A,0x3D,t),g=mix(0x6B,0xE0,t),b=mix(0x8C,0xC8,t);
            return "rgb("+r+","+g+","+b+")";});
          var fit=linreg(pts.map(function(p){return p.x;}),pts.map(function(p){return p.y;}));
          var rr=pearson(pts.map(function(p){return p.x;}),pts.map(function(p){return p.y;}));
          var note="Each dot is one week (rolling avg). Dots brighten from oldest to newest \u2014 if the bright ones sit up-and-right, you're trending toward more sleep and higher HRV.";
          if(rr!=null) note+=" r = "+rr.toFixed(2)+(Math.abs(rr)>0.5?" \u2014 they track closely.":Math.abs(rr)>0.25?" \u2014 a moderate link.":" \u2014 a weak link for you.");
          var cd=card("Sleep vs HRV \u2014 does more sleep lift it?",note);
          var cv=mkCanvas(cd,240);container.appendChild(cd);
          var ds=[{type:"scatter",label:"week",data:pts,backgroundColor:cols,pointRadius:5}];
          if(fit){var xmin=Math.min.apply(null,pts.map(function(p){return p.x;})),xmax=Math.max.apply(null,pts.map(function(p){return p.x;}));
            ds.push({type:"line",label:"best fit",data:[{x:r1(xmin),y:r1(fit.m*xmin+fit.b)},{x:r1(xmax),y:r1(fit.m*xmax+fit.b)}],borderColor:C.amber,borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false});}
          CHARTS.push(new Chart(cv,{data:{datasets:ds},options:baseOpts({scales:{
            x:{type:"linear",title:{display:true,text:"7-day avg sleep (hrs)",color:C.muted}},
            y:{title:{display:true,text:"7-day avg HRV",color:C.muted}}}})}));
        }
      } else {
        needSync(container,"Sleep vs HRV charts appear here once Oura sleep-hours data is flowing (needs the v2 relay deployed).");
      }
    })();

    // ---- Option E: how much you slept -> next-day HRV vs your average ----
    (function(){
      // pair each night's sleep hours with NEXT day's HRV, expressed vs the mean HRV
      var pairs=[];
      for(var i=0;i<model.length-1;i++){
        if(model[i].o_sleephrs!=null && model[i+1].hrv!=null) pairs.push({sleep:model[i].o_sleephrs, nextHrv:model[i+1].hrv});
      }
      if(pairs.length>=4){

        var vals=buckets.map(function(b){
          var hv=pairs.filter(function(p){return p.sleep>=b.lo&&p.sleep<b.hi;}).map(function(p){return p.nextHrv;});
          return hv.length?r1(mean(hv)-mH):null;

          ]},options:baseOpts({scales:{y:{title:{display:true,text:"HRV vs your average",color:C.muted},grid:{color:function(ctx){return ctx.tick.value===0?C.muted:C.line;}}}}})}));

    })();

    // Oura sleep vs next-day HRV correlation insight
    var pairs=[];
    for(var i=1;i<model.length;i++){ var prev=model[i-1],cur=model[i];

    if(pairs.length>=4){

      var ds2=[{type:"scatter",label:"day",data:pairs,backgroundColor:C.oura,pointRadius:4}];
      var fit2=linreg(pairs.map(function(p){return p.x;}),pairs.map(function(p){return p.y;}));
      if(fit2){var xs2=pairs.map(function(p){return p.x;});var x2min=Math.min.apply(null,xs2),x2max=Math.max.apply(null,xs2);
        ds2.push({type:"line",label:"best fit",data:[{x:x2min,y:r1(fit2.m*x2min+fit2.b)},{x:x2max,y:r1(fit2.m*x2max+fit2.b)}],borderColor:C.amber,borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false});}
      CHARTS.push(new Chart(cv2,{data:{datasets:ds2},
        options:baseOpts({scales:{x:{type:"linear",title:{display:true,text:"prev-night sleep",color:C.muted}},y:{title:{display:true,text:"HRV",color:C.muted}}}})}));

    // what predicts good vs bad days: compare avg metrics on green vs red days

    function avg(list,key){var v=list.map(function(d){return d[key];}).filter(function(x){return x!=null&&isFinite(x);});return v.length?mean(v):null;}
    if(greens.length>=2&&reds.length>=2){
      var ins=document.createElement("div");ins.className="insight";
      var gSleep=avg(greens,"hp_sleep"),rSleep=avg(reds,"hp_sleep");

      var lines=["<b>What your good vs bad days look like</b> ("+greens.length+" green, "+reds.length+" red so far):"];
      if(gSubj!=null&&rSubj!=null) lines.push("\u2022 Subjective: "+gSubj.toFixed(1)+" on green days vs "+rSubj.toFixed(1)+" on red");
      if(gRhr!=null&&rRhr!=null) lines.push("\u2022 Resting HR: "+Math.round(gRhr)+" on green vs "+Math.round(rRhr)+" on red");
      if(gSleep!=null&&rSleep!=null) lines.push("\u2022 Sleep score: "+gSleep.toFixed(1)+" on green vs "+rSleep.toFixed(1)+" on red");
      ins.innerHTML=lines.join("<br>");

    // weekly summary: last 7 days band counts + trend
    var last7=rowsB.slice(-7);

      var g=last7.filter(function(d){return d.band==="green";}).length;

        wc.appendChild(tr);}
      container.appendChild(wc);

    // ---- Training load vs recovery (from locally-logged sessions) ----
    var loghist=getJSON(K_LOGHIST,[]);

      loghist.forEach(function(l){ if(!l.date) return; byDate[l.date]=(byDate[l.date]||0)+(l.topWeight||0); });
      var dates=Object.keys(byDate).sort();
      if(dates.length>=2){

        var hrvByDate={}; model.forEach(function(d){ if(d.roll7!=null) hrvByDate[d.iso]=r1(d.roll7); });
        var cd=card("Training load vs recovery","Bars = training load that day (sum of top set weights). Line = your 7-day HRV trend. When load climbs while the line falls, you're outrunning recovery.");

      needSync(container,"Bar-speed trends appear here once you've logged velocity for a lift a few times. Tracking bar speed at a given load is elite-level fatigue monitoring \u2014 a speed drop flags fatigue early.");

  }

  // ---------- Training tab (gym sheet) ----------
  var gymStatus={state:"idle",msg:""};
  // strip the "A1)" style prefix and normalise an exercise name for matching
  function normEx(s){return (s||"").toLowerCase().replace(/^[a-z]\d*\)\s*/,"").replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();}
  function fuzzyMatch(a,b){
    if(!a||!b) return false;
    if(a===b) return true;
    if(a.indexOf(b)>=0||b.indexOf(a)>=0) return true;
    var aw=a.split(" ").filter(function(w){return w.length>2;});
    var bw=b.split(" ");
    if(!aw.length) return false;
    var shared=aw.filter(function(w){return bw.indexOf(w)>=0;}).length;
    return shared/aw.length>=0.5;
  }
  // find the most recent PRIOR week (from sheet history) where this exercise was done.
  // currentOrder = the tab order of the week being viewed, so we only look further back.
  function findPrevLift(exName,currentOrder){
    var gym=getJSON(K_GYM,null);
    var hist=(gym&&gym.history)?gym.history:[];
    if(!hist.length) return null;
    var target=normEx(exName);
    if(!target) return null;
    var matches=hist.filter(function(l){
      if(currentOrder!=null && l.order!=null && l.order>=currentOrder) return false; // only earlier weeks
      return fuzzyMatch(target,normEx(l.exercise));
    });
    if(!matches.length) return null;
    // most recent prior = highest order (falls back to last in list)
    matches.sort(function(a,b){ return (b.order||0)-(a.order||0); });
    var m=matches[0];
    // map sheet 'sets' (H-K strings) to the weights array the UI expects
    return {exercise:m.exercise, week:m.week, date:m.date, weights:m.sets||[], vels:null};
  }
  // resolve the current week's tab order from the loaded programme (for the "prior only" filter)
  function weekOrder(weekName){
    var gym=getJSON(K_GYM,null);
    var hist=(gym&&gym.history)?gym.history:[];
    for(var i=0;i<hist.length;i++){ if(hist[i].week===weekName && hist[i].order!=null) return hist[i].order; }
    return null;
  }

  var K_GYMTRENDSEL="readiness_gymtrend_ex_v1"; // remembers the picked exercise
  function buildGymTrends(container){
    destroyCharts();
    Chart.defaults.font.family="Inter, system-ui, sans-serif"; Chart.defaults.color=C.muted;
    var gym=getJSON(K_GYM,null);
    var hist=(gym&&gym.history)?gym.history:[];
    if(!hist.length){
      needSync(container,"No training history yet. Deploy Apps Script v4 and tap \u201cSync programme\u201d on the Training tab \u2014 these charts read your logged weeks from the sheet.");
      return;
    }

    // group history by normalised exercise name; keep display name + records
    var groups={};
    hist.forEach(function(h){
      var key=normEx(h.exercise);
      if(!key) return;
      if(!groups[key]) groups[key]={name:h.exercise, recs:[]};
      // avg of the numeric sets done that session
      var nums=(h.sets||[]).map(function(x){return parseFloat(x);}).filter(function(x){return !isNaN(x)&&x>0;});
      var avg=nums.length?mean(nums):null;
      var top=nums.length?Math.max.apply(null,nums):null;
      groups[key].recs.push({week:h.week, order:h.order||0, avg:avg, top:top, done:true});
    });
    // sort each group's records by week order
    Object.keys(groups).forEach(function(k){ groups[k].recs.sort(function(a,b){return a.order-b.order;}); });

    // exercises sorted by how many sessions (most-trained first)
    var exKeys=Object.keys(groups).sort(function(a,b){return groups[b].recs.length-groups[a].recs.length;});

    // ---- exercise picker ----
    var sel=get(K_GYMTRENDSEL); if(!sel||!groups[sel]) sel=exKeys[0];
    var pickCard=document.createElement("div");pickCard.className="card";
    var plab=document.createElement("div");plab.style.cssText="font-size:12px;color:"+C.muted+";margin-bottom:6px;";plab.textContent="Exercise";
    var dd=document.createElement("select");dd.style.cssText="width:100%;padding:10px 11px;border-radius:8px;border:1px solid "+C.glow+"66;background:"+C.panel2+";color:"+C.ink+";font-size:15px;";
    exKeys.forEach(function(k){var op=document.createElement("option");op.value=k;op.textContent=groups[k].name.replace(/^[A-Z]\d*\)\s*/,"")+"  ("+groups[k].recs.length+"\u00d7)";if(k===sel)op.selected=true;dd.appendChild(op);});
    dd.onchange=function(){set(K_GYMTRENDSEL,dd.value);render(false);};
    pickCard.appendChild(plab);pickCard.appendChild(dd);container.appendChild(pickCard);

    // ---- weight over time for the picked exercise (average of sets done) ----
    (function(){
      var g=groups[sel]; if(!g) return;
      var recs=g.recs.filter(function(r){return r.avg!=null;});
      var cd=card("Weight over time \u2014 "+g.name.replace(/^[A-Z]\d*\)\s*/,""),"Average of the sets you did each session, in week order. The dotted line is your top set that day.");
      var cv=mkCanvas(cd,240);container.appendChild(cd);
      if(recs.length<1){var e=document.createElement("div");e.className="cnote";e.style.padding="8px 4px";e.textContent="No weighted sessions recorded for this exercise (it may be bodyweight or marked with an X).";cd.appendChild(e);return;}
      CHARTS.push(new Chart(cv,{data:{labels:recs.map(function(r){return r.week.replace(/\s*\(.*\)/,"").slice(0,14);}),datasets:[
        {type:"line",label:"avg of sets",data:recs.map(function(r){return r1(r.avg);}),borderColor:C.green,backgroundColor:C.green+"22",borderWidth:2.6,pointRadius:3,pointBackgroundColor:C.green,tension:0.25,fill:true,order:2},
        {type:"line",label:"top set",data:recs.map(function(r){return r.top;}),borderColor:C.amber,borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.25,order:1}
      ]},options:baseOpts(deepMerge({scales:{y:{title:{display:true,text:"kg",color:C.muted}}}},LEG))}));
    })();

    // ---- sessions completed per week (across all exercises) ----
    (function(){
      var byWeek={}, order={};
      hist.forEach(function(h){ var w=h.week; byWeek[w]=(byWeek[w]||0)+1; order[w]=h.order||0; });
      var weeks=Object.keys(byWeek).sort(function(a,b){return order[a]-order[b];});
      if(weeks.length<1) return;
      var cd=card("Sessions logged per week","How many exercises you completed each week (any set with a weight or an X counts).");
      var cv=mkCanvas(cd,220);container.appendChild(cd);
      CHARTS.push(new Chart(cv,{type:"bar",data:{labels:weeks.map(function(w){return w.replace(/\s*\(.*\)/,"").slice(0,14);}),datasets:[
        {label:"exercises done",data:weeks.map(function(w){return byWeek[w];}),backgroundColor:C.hrv+"88",borderColor:C.hrv,borderWidth:1,borderRadius:3}
      ]},options:baseOpts({scales:{y:{title:{display:true,text:"exercises",color:C.muted},ticks:{precision:0}}}})}));
    })();

    // ---- summary line ----
    var totalSessions=hist.length;
    var distinctEx=exKeys.length;
    var sumCard=document.createElement("div");sumCard.className="cnote";sumCard.style.cssText="text-align:center;color:"+C.muted+";margin-top:4px;";
    sumCard.textContent=totalSessions+" logged sessions across "+distinctEx+" exercises, from your sheet history.";
    container.appendChild(sumCard);
  }

        function wpaint(){ wBox.className="chkbox"+(wState.on?" on":""); wLbl.textContent=wState.on?"Done \u2713":"Done"; wLbl.style.color=wState.on?C.green:C.muted; }
        wWrap.onclick=function(){ wState.on=!wState.on; wpaint(); };

    if(isWarmup){

  }
